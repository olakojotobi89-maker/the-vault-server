<div id="vault-feed">
        <div class="search-container" style="margin-bottom: 20px;">
            <div style="position: relative; width: 100%;">
                <i class="fas fa-search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.5;"></i>
                <input type="text" id="vaultSearch" placeholder="Search the Vault..." 
                    style="width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); padding: 12px 12px 12px 45px; border-radius: 15px; color: white; outline: none; box-sizing: border-box;">
            </div>
        </div>

        <div class="post-card" style="padding: 20px; margin-bottom: 20px;">
             <textarea id="postCaption" placeholder="Write something confidential..." 
                style="width: 100%; background: rgba(0,0,0,0.2); border: none; border-radius: 15px; padding: 15px; color: white; resize: none; min-height: 80px; outline: none; box-sizing: border-box;"></textarea>
             <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                 <div style="display: flex; gap: 20px; opacity: 0.7;">
                     <i class="fas fa-image" style="cursor: pointer;" onclick="document.getElementById('mediaInput').click()"></i>
                     <i class="fas fa-video" style="cursor: pointer;" onclick="document.getElementById('mediaInput').click()"></i>
                 </div>
                 <button onclick="submitPost()" style="background: #fdbb2d; color: black; border: none; padding: 10px 30px; border-radius: 20px; font-weight: bold; cursor: pointer;">Post</button>
             </div>
             <input type="file" id="mediaInput" style="display: none;" onchange="previewMedia()">
             <div id="media-preview" style="margin-top: 10px;"></div>
        </div>

        <div id="feed-content">
            </div>
    </div>

    <script>
        let allPosts = []; // Global store for search filtering

        // --- SEARCH LOGIC ---
        document.getElementById('vaultSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allPosts.filter(post => 
                post.sender.toLowerCase().includes(term) || 
                (post.caption && post.caption.toLowerCase().includes(term))
            );
            renderPosts(filtered);
        });

        async function loadFeed() {
            try {
                const res = await fetch('/api/posts');
                allPosts = await res.json();
                renderPosts(allPosts);
            } catch (err) { console.error(err); }
        }

        function renderPosts(posts) {
            const container = document.getElementById('feed-content');
            container.innerHTML = '';
            
            posts.forEach(post => {
                const postEl = document.createElement('div');
                postEl.className = 'post-card';
                postEl.style.marginBottom = "15px";
                postEl.id = `post-${post._id}`;
                
                let mediaHtml = post.media ? (post.type === 'video' 
                    ? `<video src="${post.media}" controls style="width:100%; border-radius:15px; margin-top:10px;"></video>`
                    : `<img src="${post.media}" style="width:100%; border-radius:15px; margin-top:10px;">`) : '';

                postEl.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <div class="profile-img" onclick="goToProfile('${post.sender}')">
                                ${post.sender[0].toUpperCase()}
                            </div>
                            <span style="font-weight:bold;">@${post.sender}</span>
                        </div>
                        ${post.sender === myName ? `<i class="fas fa-trash" style="opacity:0.3;" onclick="deletePost('${post._id}')"></i>` : ''}
                    </div>
                    <p style="margin:15px 0; font-size:14px;">${post.caption || ""}</p>
                    ${mediaHtml}
                `;
                container.appendChild(postEl);
            });
        }

        // ... (Keep your submitPost, goToProfile, and Badge logic) ...
    </script>
