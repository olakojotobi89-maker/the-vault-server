<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBNT | Home</title>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        if (!localStorage.getItem('vault_username')) {
            window.location.href = 'index.html';
        }
        function logoutVault() {
            localStorage.removeItem('vault_username');
            window.location.href = 'index.html';
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%); }
        body {
            margin: 0; padding: 20px 0; min-height: 100vh;
            display: flex; justify-content: center;
            background: var(--primary-gradient);
            font-family: -apple-system, sans-serif; color: white;
        }
        .home-container { width: 95%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        
        .search-container { position: relative; margin-bottom: 20px; }
        .search-input {
            width: 100%; padding: 12px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1); color: white; outline: none; box-sizing: border-box;
        }
        .search-results {
            position: absolute; width: 100%; top: 50px; background: #1a1a1a;
            border-radius: 15px; z-index: 1000; display: none; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .search-item {
            padding: 12px; display: flex; align-items: center; gap: 10px;
            text-decoration: none; color: white; border-bottom: 1px solid #333;
        }
        .search-item:hover { background: rgba(255,255,255,0.1); }

        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .nav-item {
            background: rgba(255, 255, 255, 0.15); padding: 15px; border-radius: 20px;
            text-decoration: none; color: white; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 13px;
        }
        .nav-item i { font-size: 18px; }
        .chat-link { grid-column: span 2; background: linear-gradient(to right, #00d2ff, #3a7bd5); flex-direction: row; justify-content: center; font-weight: bold; }
        
        .post-input-box { background: rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        textarea { width: 100%; background: transparent; border: none; color: white; outline: none; resize: none; font-size: 16px; margin-bottom: 10px; }
        .media-controls { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .upload-label { cursor: pointer; font-size: 20px; color: #00d2ff; }
        .post-btn { background: #fdbb2d; border: none; padding: 8px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        #feed-display { display: flex; flex-direction: column; gap: 15px; }
        .post { background: rgba(0, 0, 0, 0.25); border-radius: 20px; padding: 15px; transition: opacity 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .post-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
        .post-user-link { text-decoration: none; color: #00d2ff; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .mini-avatar { width: 32px; height: 32px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 1px solid rgba(255,255,255,0.2); overflow: hidden; }
        .mini-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-caption { margin-bottom: 10px; line-height: 1.4; font-size: 14.5px; }
        .post-media { width: 100%; border-radius: 15px; margin-bottom: 10px; max-height: 450px; object-fit: cover; }
        .post-actions { display: flex; gap: 20px; font-size: 13px; opacity: 0.8; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .delete-icon { cursor: pointer; color: rgba(255,255,255,0.4); font-size: 14px; padding: 5px; }
        .delete-icon:hover { color: #ff4b2b; }

        .comments-section { margin-top: 10px; }
        .comment-list { font-size: 13px; margin-bottom: 10px; max-height: 150px; overflow-y: auto; }
        .comment-item { margin-bottom: 5px; opacity: 0.9; }
        .comment-item b { color: #fdbb2d; margin-right: 5px; }
        .comment-input-area { display: flex; gap: 10px; }
        .comment-input {
            flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 8px 12px; color: white; font-size: 13px; outline: none;
        }
        .send-comment-btn { background: none; border: none; color: #00d2ff; cursor: pointer; font-size: 16px; }

        .notification-toast {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px);
            padding: 15px 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.3);
            color: white; z-index: 9999; animation: slideIn 0.5s ease-out;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="home-container">
        <div class="glass-card">
            <h1 style="margin: 0; text-align: center; letter-spacing: 2px;">BBNT</h1>
            <p style="text-align: center; margin: 5px 0 0; font-size: 14px; opacity: 0.8;">
                Welcome back, <span id="user-greeting" style="color: #fdbb2d; font-weight: bold;">User</span>
            </p>

            <div class="nav-grid">
                <a href="chat.html" class="nav-item chat-link"><i class="fas fa-comments"></i> <span>Open Private Chat</span></a>
                <a id="my-profile-link" href="#" class="nav-item"><i class="fas fa-user-circle"></i> <span>My Profile</span></a>
                <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i> <span>Settings</span></a>
                <div onclick="logoutVault()" class="nav-item" style="grid-column: span 2; flex-direction: row; justify-content: center; background: rgba(255,0,0,0.1);">
                    <i class="fas fa-lock"></i> <span>Lock Vault</span>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="🔍 Search users..." oninput="searchUsers(this.value)">
                <div id="search-results" class="search-results"></div>
            </div>

            <div style="font-weight: bold; margin-bottom: 15px;"><i class="fas fa-rss"></i> Feed</div>
            
            <div class="post-input-box">
                <textarea id="post-caption" placeholder="What's on your mind?..." rows="2"></textarea>
                <div class="media-controls">
                    <label class="upload-label">
                        <i class="fas fa-camera"></i>
                        <input type="file" id="media-upload" accept="image/*,video/*" style="display: none;">
                    </label>
                    <span id="file-name" style="font-size: 10px; opacity: 0.6;">No file selected</span>
                    <button class="post-btn" onclick="createPost()">Post</button>
                </div>
            </div>

            <div id="feed-display">
                <p style="text-align:center; opacity:0.5;">Loading feed...</p>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const myName = localStorage.getItem('vault_username') || 'Guest';
        document.getElementById('user-greeting').innerText = myName;
        document.getElementById('my-profile-link').href = `profile.html?user=${myName}`;

        const fileInput = document.getElementById('media-upload');
        const fileNameLabel = document.getElementById('file-name');

        fileInput.onchange = () => {
            if (fileInput.files.length > 0) fileNameLabel.innerText = fileInput.files[0].name;
        };

        socket.on('receive_like', (data) => {
            if (data.owner === myName && data.sender !== myName) {
                const toast = document.createElement('div');
                toast.className = 'notification-toast';
                toast.innerHTML = `<i class="fas fa-heart" style="color:#ff4b2b"></i> <b>${data.sender}</b> liked your post!`;
                document.body.appendChild(toast);
                setTimeout(() => { toast.remove(); }, 3000);
            }
        });

        async function createPost() {
            const caption = document.getElementById('post-caption').value.trim();
            const file = fileInput.files[0];
            const postBtn = document.querySelector('.post-btn');

            if (!caption && !file) return;

            postBtn.innerText = "Vaulting...";
            postBtn.disabled = true;

            let mediaBase64 = '';
            let fileType = 'text';

            if (file) {
                const reader = new FileReader();
                mediaBase64 = await new Promise(resolve => {
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
                fileType = file.type.startsWith('video') ? 'video' : 'image';
            }

            try {
                const response = await fetch('/api/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender: myName, caption, media: mediaBase64, type: fileType })
                });

                if (response.ok) {
                    document.getElementById('post-caption').value = '';
                    fileInput.value = '';
                    fileNameLabel.innerText = 'No file selected';
                    loadFeed(); 
                }
            } catch (err) { alert("Connection error."); }
            finally {
                postBtn.innerText = "Post";
                postBtn.disabled = false;
            }
        }

        async function loadFeed() {
            try {
                const response = await fetch('/api/posts');
                const posts = await response.json();
                const feed = document.getElementById('feed-display');
                feed.innerHTML = ''; 

                if (posts.length === 0) {
                    feed.innerHTML = '<p style="text-align:center; opacity:0.5; margin-top:20px;">The Vault is empty.</p>';
                    return;
                }

                for (const post of posts) {
                    const postDiv = document.createElement('div');
                    postDiv.className = 'post';
                    
                    const userRes = await fetch(`/api/profile/${post.sender}`);
                    const userData = await userRes.json();
                    const avatarHTML = userData.profilePic ? `<img src="${userData.profilePic}">` : post.sender.charAt(0).toUpperCase();

                    let mediaHTML = '';
                    if (post.media) {
                        mediaHTML = post.type === 'video' 
                            ? `<video src="${post.media}" class="post-media" controls></video>` 
                            : `<img src="${post.media}" class="post-media" loading="lazy">`;
                    }
                    
                    const commentsHTML = (post.comments || []).map(c => `
                        <div class="comment-item"><b>${c.user}:</b> ${c.text}</div>
                    `).join('');

                    // Logic to check if I have liked this post
                    const isLiked = (post.likedBy || []).includes(myName);
                    const heartClass = isLiked ? 'fas fa-heart' : 'far fa-heart';
                    const heartColor = isLiked ? '#ff4b2b' : 'white';

                    postDiv.innerHTML = `
                        <div class="post-header">
                            <a href="profile.html?user=${post.sender}" class="post-user-link">
                                <div class="mini-avatar">${avatarHTML}</div>
                                <span>${post.sender}</span>
                            </a>
                            ${post.sender === myName ? `<i class="fas fa-trash-alt delete-icon" onclick="deletePost('${post._id}')"></i>` : ''}
                        </div>
                        ${mediaHTML}
                        <div class="post-caption"><b>${post.sender}</b> ${post.caption}</div>
                        <div class="post-actions">
                            <span onclick="handleLike(this, '${post._id}', '${post.sender}')" style="cursor:pointer; color: ${heartColor}">
                                <i class="${heartClass}"></i> <span class="like-count">${post.likes || 0}</span>
                            </span>
                            <span style="cursor:pointer;"><i class="far fa-comment"></i> ${(post.comments || []).length}</span>
                        </div>
                        <div class="comments-section">
                            <div class="comment-list">${commentsHTML}</div>
                            <div class="comment-input-area">
                                <input type="text" class="comment-input" id="input-${post._id}" placeholder="Add a comment...">
                                <button class="send-comment-btn" onclick="submitComment('${post._id}')"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>
                    `;
                    feed.appendChild(postDiv);
                }
            } catch (err) { console.error(err); }
        }

        async function handleLike(btn, postId, postOwner) {
            const icon = btn.querySelector('i');
            const countSpan = btn.querySelector('.like-count');

            try {
                const response = await fetch(`/api/posts/${postId}/like`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: myName })
                });
                const data = await response.json();

                // Update UI based on server response
                countSpan.innerText = data.likes;
                if (data.likedBy.includes(myName)) {
                    icon.classList.replace('far', 'fas');
                    btn.style.color = "#ff4b2b";
                    socket.emit('send_like', { sender: myName, owner: postOwner });
                } else {
                    icon.classList.replace('fas', 'far');
                    btn.style.color = "white";
                }
            } catch (err) { console.error(err); }
        }

        async function submitComment(postId) {
            const input = document.getElementById(`input-${postId}`);
            const text = input.value.trim();
            if (!text) return;

            try {
                const response = await fetch(`/api/posts/${postId}/comment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: myName, text: text })
                });
                if (response.ok) {
                    input.value = '';
                    loadFeed(); // Refresh feed to show new permanent comment
                }
            } catch (err) { console.error(err); }
        }

        async function deletePost(postId) {
            if (!confirm("Are you sure?")) return;
            try {
                const response = await fetch(`/api/posts/${postId}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: myName })
                });
                if (response.ok) loadFeed();
            } catch (err) { console.error(err); }
        }

        async function searchUsers(query) {
            const resultsDiv = document.getElementById('search-results');
            if (query.length < 1) { resultsDiv.style.display = 'none'; return; }
            try {
                const response = await fetch(`/api/search/${encodeURIComponent(query)}`);
                const users = await response.json();
                resultsDiv.style.display = users.length > 0 ? 'block' : 'none';
                resultsDiv.innerHTML = users.map(user => `
                    <a href="profile.html?user=${user.username}" class="search-item">
                        <div class="mini-avatar">${user.profilePic ? `<img src="${user.profilePic}">` : user.username.charAt(0).toUpperCase()}</div>
                        <span>${user.username}</span>
                    </a>
                `).join('');
            } catch (err) { console.error(err); }
        }

        loadFeed();
    </script>
</body>
</html>
