    <script>
        const socket = io();
        const myName = localStorage.getItem('vault_username');
        
        // ... (Keep your existing feed/post functions) ...

        // --- NEW: MESSAGE BADGE LOGIC ---
        async function updateChatBadge() {
            try {
                const res = await fetch(`/api/unread-messages-count/${myName}`);
                const data = await res.json();
                const badge = document.getElementById('chat-badge');
                
                if (data.count > 0) {
                    badge.innerText = data.count > 99 ? '99+' : data.count;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }
            } catch (e) { console.log("Chat badge update failed"); }
        }

        // Listen for the 'update_badge' event we added to server.js
        socket.on('update_badge', () => {
            document.getElementById('notifSound').play();
            updateChatBadge();
        });

        // Initial check and periodic refresh
        updateChatBadge();
        setInterval(updateChatBadge, 10000); 

        // --- EXISTING NOTIFICATION LOGIC ---
        async function updateNotifBadge() {
            try {
                const res = await fetch(`/api/notifications/${myName}?unread=true`);
                const data = await res.json();
                const badge = document.getElementById('notif-badge');
                if (data.length > 0) {
                    badge.innerText = data.length;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }
            } catch (e) { console.log("Notif update failed"); }
        }

        socket.on('receive_like', (data) => {
            if (data.owner === myName) {
                document.getElementById('notifSound').play();
                updateNotifBadge();
            }
        });

        setInterval(updateNotifBadge, 15000);
        updateNotifBadge();
        
        // ... (Keep the rest of your loadFeed/submitPost functions) ...
    </script>
