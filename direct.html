<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vault | Direct</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #fdbb2d; --glass: rgba(255, 255, 255, 0.1); }
        body { 
            margin: 0; padding: 0; height: 100dvh; 
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            font-family: -apple-system, sans-serif; color: white; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Header */
        .chat-header {
            padding: 15px; background: rgba(0,0,0,0.3); backdrop-filter: blur(20px);
            display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back-btn { color: white; font-size: 20px; text-decoration: none; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .pfp-small { width: 35px; height: 35px; border-radius: 50%; background: #222; border: 1px solid var(--primary); display:flex; align-items:center; justify-content:center; font-weight:bold; }

        /* Messages Area */
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 10px;
            scroll-behavior: smooth;
        }

        .msg { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; }
        .sent { align-self: flex-end; background: var(--primary); color: black; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: var(--glass); backdrop-filter: blur(10px); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        
        .time { font-size: 9px; opacity: 0.5; display: block; margin-top: 5px; text-align: right; }

        /* Input Area */
        .input-area {
            padding: 20px; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px);
            display: flex; gap: 10px; align-items: center; padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }
        input {
            flex: 1; background: var(--glass); border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 20px; border-radius: 25px; color: white; outline: none;
        }
        .send-btn { 
            width: 45px; height: 45px; border-radius: 50%; background: var(--primary); 
            border: none; color: black; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="chat.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
        <div class="user-info">
            <div class="pfp-small" id="target-pfp">?</div>
            <span id="target-name" style="font-weight: bold;">Loading...</span>
        </div>
    </div>

    <div id="chat-window"></div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        const socket = io();
        const myName = localStorage.getItem('vault_username');
        const urlParams = new URLSearchParams(window.location.search);
        const targetUser = urlParams.get('user');

        if(!targetUser) window.location.href = 'chat.html';

        document.getElementById('target-name').innerText = targetUser;
        document.getElementById('target-pfp').innerText = targetUser[0].toUpperCase();

        socket.emit('join_private', myName);

        // 1. Load History
        async function loadHistory() {
            const res = await fetch(`/api/messages/${myName}/${targetUser}`);
            const messages = await res.json();
            const window = document.getElementById('chat-window');
            window.innerHTML = messages.map(m => renderMessage(m)).join('');
            scrollToBottom();
        }

        function renderMessage(m) {
            const isMe = m.sender === myName;
            return `
                <div class="msg ${isMe ? 'sent' : 'received'}">
                    ${m.content}
                    <span class="time">${new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
            `;
        }

        // 2. Real-time Listening
        socket.on('receive_message', (msg) => {
            // Only show if the message is from the person I am currently talking to
            if (msg.sender === targetUser || msg.sender === myName) {
                const window = document.getElementById('chat-window');
                window.innerHTML += renderMessage(msg);
                scrollToBottom();
            }
        });

        // 3. Sending
        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;

            const data = {
                sender: myName,
                receiver: targetUser,
                content: text,
                type: 'text'
            };

            socket.emit('send_message', data);
            input.value = '';
        }

        function scrollToBottom() {
            const win = document.getElementById('chat-window');
            win.scrollTop = win.scrollHeight;
        }

        loadHistory();
    </script>
</body>
</html>
