<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vault | Direct</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #fdbb2d; --glass: rgba(255, 255, 255, 0.1); }
        body { 
            margin: 0; padding: 0; height: 100dvh; 
            background: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            font-family: -apple-system, sans-serif; color: white; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .chat-header {
            padding: 15px; background: rgba(0,0,0,0.3); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .user-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .pfp-small { width: 35px; height: 35px; border-radius: 50%; background: #222; border: 1px solid var(--primary); display:flex; align-items:center; justify-content:center; font-weight:bold; overflow: hidden; }
        .pfp-small img { width: 100%; height: 100%; object-fit: cover; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; }
        .sent { align-self: flex-end; background: var(--primary); color: black; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: var(--glass); backdrop-filter: blur(10px); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .sender-tag { font-size: 10px; font-weight: bold; margin-bottom: 3px; display: block; color: var(--primary); }
        .time { font-size: 9px; opacity: 0.5; display: block; margin-top: 5px; text-align: right; }

        .input-area { padding: 15px; background: rgba(0,0,0,0.4); display: flex; gap: 10px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        input { flex: 1; background: var(--glass); border: 1px solid rgba(255,255,255,0.2); padding: 12px 18px; border-radius: 25px; color: white; outline: none; }
        .send-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); border: none; color: black; display: flex; align-items: center; justify-content: center; }

        .modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        .modal-content { background: #222; width: 90%; max-width: 400px; border-radius: 25px; padding: 20px; }
        .member-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="chat-header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <a href="chat.html" style="color: white;"><i class="fas fa-chevron-left"></i></a>
            <div class="user-info" id="chat-info-trigger">
                <div class="pfp-small" id="target-pfp">?</div>
                <div>
                    <div id="target-name" style="font-weight: bold; font-size: 14px;">Loading...</div>
                    <div id="target-status" style="font-size: 10px; opacity: 0.6;">...</div>
                </div>
            </div>
        </div>
        <div id="admin-icon" style="display: none; color: var(--primary); cursor: pointer;" onclick="toggleModal(true)">
            <i class="fas fa-info-circle"></i>
        </div>
    </div>

    <div id="chat-window"></div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3 id="group-title-modal">Group Info</h3>
            <p id="group-desc-modal" style="font-size: 12px; opacity: 0.7;"></p>
            
            <div id="admin-controls" style="display: none;">
                <input type="text" id="new-member-name" placeholder="Username to add..." style="width: 100%; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 10px; border-radius: 10px; color: white;">
                <button onclick="manageMember('add')" style="background: var(--primary); border:none; padding: 10px; width: 100%; border-radius: 10px; font-weight:bold; cursor: pointer;">Add Member</button>
            </div>

            <div style="margin-top: 20px;">
                <h4 style="font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">Members</h4>
                <div id="member-list" style="max-height: 200px; overflow-y: auto;"></div>
            </div>
            
            <button onclick="toggleModal(false)" style="margin-top: 20px; width: 100%; background: #444; border:none; padding: 10px; color:white; border-radius:10px; cursor: pointer;">Close</button>
        </div>
    </div>

    <script>
        const socket = io();
        const myName = localStorage.getItem('vault_username');
        const urlParams = new URLSearchParams(window.location.search);
        const targetUser = urlParams.get('user');
        const groupId = urlParams.get('groupId');

        let groupData = null;

        async function initChat() {
            if (groupId) {
                // Fetch group data
                const res = await fetch(`/api/groups/my-groups/${myName}`);
                const groups = await res.json();
                groupData = groups.find(g => g._id === groupId);
                
                if (!groupData) {
                    console.error("Access Denied: Not a member of this group.");
                    return window.location.href = 'chat.html';
                }

                document.getElementById('target-name').innerText = groupData.name;
                document.getElementById('target-status').innerText = `${groupData.members.length} members`;
                document.getElementById('admin-icon').style.display = 'block';
                
                if(groupData.groupPic) {
                    document.getElementById('target-pfp').innerHTML = `<img src="${groupData.groupPic}">`;
                } else {
                    document.getElementById('target-pfp').innerHTML = `<i class="fas fa-users"></i>`;
                }
                
                // Join the Socket.io room for this group
                socket.emit('join_group', groupId);
                loadGroupHistory();
            } else {
                if(!targetUser) return window.location.href = 'chat.html';
                document.getElementById('target-name').innerText = targetUser;
                document.getElementById('target-status').innerText = 'Online';
                document.getElementById('target-pfp').innerText = targetUser[0].toUpperCase();
                
                socket.emit('join_private', myName);
                loadPrivateHistory();
            }
        }

        async function loadPrivateHistory() {
            try {
                const res = await fetch(`/api/messages/${myName}/${targetUser}`);
                const msgs = await res.json();
                document.getElementById('chat-window').innerHTML = msgs.map(m => renderMsg(m)).join('');
                scrollToBottom();
            } catch(e) { console.error("History fail:", e); }
        }

        async function loadGroupHistory() {
            try {
                const res = await fetch(`/api/messages/group/${groupId}`);
                const msgs = await res.json();
                document.getElementById('chat-window').innerHTML = msgs.map(m => renderMsg(m, true)).join('');
                scrollToBottom();
            } catch(e) { console.error("Group history fail:", e); }
        }

        function renderMsg(m, isGroup = false) {
            const isMe = m.sender === myName;
            return `
                <div class="msg ${isMe ? 'sent' : 'received'}">
                    ${isGroup && !isMe ? `<span class="sender-tag">${m.sender}</span>` : ''}
                    ${m.content}
                    <span class="time">${new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                </div>
            `;
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;

            const data = { sender: myName, content: text, timestamp: new Date() };

            if(groupId) {
                data.groupId = groupId;
                socket.emit('send_group_message', data);
            } else {
                data.receiver = targetUser;
                socket.emit('send_message', data);
            }
            input.value = '';
        }

        socket.on('receive_message', (msg) => {
            if(!groupId && (msg.sender === targetUser || msg.sender === myName)) {
                document.getElementById('chat-window').innerHTML += renderMsg(msg);
                scrollToBottom();
            }
        });

        socket.on('receive_group_message', (msg) => {
            if(groupId && msg.groupId === groupId) {
                document.getElementById('chat-window').innerHTML += renderMsg(msg, true);
                scrollToBottom();
            }
        });

        function toggleModal(show) {
            const modal = document.getElementById('adminModal');
            modal.style.display = show ? 'flex' : 'none';
            
            if(show && groupData) {
                document.getElementById('group-title-modal').innerText = groupData.name;
                document.getElementById('group-desc-modal').innerText = groupData.description || "Private Vault Group";
                
                const isAdmin = groupData.admin === myName;
                document.getElementById('admin-controls').style.display = isAdmin ? 'block' : 'none';
                
                document.getElementById('member-list').innerHTML = groupData.members.map(m => `
                    <div class="member-item">
                        <span>${m} ${m === groupData.admin ? '<small>(Admin)</small>' : ''}</span>
                        ${isAdmin && m !== myName ? 
                            `<button onclick="manageMember('remove', '${m}')" style="background:none; border:none; color:#ff4444; cursor:pointer;"><i class="fas fa-user-minus"></i></button>` 
                            : ''}
                    </div>
                `).join('');
            }
        }

        async function manageMember(action, target) {
            const targetToManage = target || document.getElementById('new-member-name').value.trim();
            if(!targetToManage) return;

            try {
                const res = await fetch(`/api/groups/${groupId}/manage-member`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminUser: myName, targetUser: targetToManage, action })
                });
                if(res.ok) {
                    location.reload(); 
                } else {
                    const err = await res.json();
                    alert(err.message || "Failed to update member");
                }
            } catch(e) { alert("Error connecting to server."); }
        }

        function scrollToBottom() { 
            const win = document.getElementById('chat-window'); 
            win.scrollTop = win.scrollHeight; 
        }

        initChat();
    </script>
</body>
</html>
