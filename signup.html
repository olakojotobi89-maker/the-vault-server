<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Vault | Register</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px 30px;
            border-radius: 40px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            color: white;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.3);
        }
        .avatar {
            font-size: 40px;
            background: rgba(255, 255, 255, 0.1);
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 15px;
            border: none;
            outline: none;
            box-sizing: border-box;
        }
        .signup-btn {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: #2ecc71;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
        .link {
            margin-top: 15px;
            display: block;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="avatar">📝</div>
        <h2>Create Account</h2>
        <p>Join the Private Vault</p>
        
        <form id="signup-form">
            <input type="text" id="reg-user" placeholder="Choose Username" required>
            <input type="email" id="reg-email" placeholder="Email Address" required>
            <input type="tel" id="reg-phone" placeholder="Phone Number" required>
            <input type="password" id="reg-pass" placeholder="Choose Password" required>
            <button type="submit" class="signup-btn">Register</button>
        </form>
        <a href="login.html" class="link">Already have an account? Login</a>
    </div>

    <script>
    document.getElementById('signup-form').onsubmit = async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('reg-user').value;
        const email = document.getElementById('reg-email').value;
        const phone = document.getElementById('reg-phone').value;
        const password = document.getElementById('reg-pass').value;

        try {
            // FIXED: Removed localhost so it works on Render
            const response = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, email, phone })
            });

            const data = await response.json();

            if (response.ok) {
                alert("Account created! Redirecting to login...");
                window.location.href = 'login.html'; // REDIRECT TO LOGIN
            } else {
                alert("Error: " + data.error);
            }
        } catch (err) {
            alert("Could not connect to the vault. Please try again in a moment!");
        }
    };
    </script>

</body>
</html>
