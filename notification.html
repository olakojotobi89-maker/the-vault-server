<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vault | Activity</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%); }
        
        body { 
            margin: 0; padding: 0; min-height: 100dvh;
            background: var(--primary-gradient); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            color: white; display: flex; justify-content: center; 
        }

        .container { width: 95%; max-width: 500px; padding: 20px 0 100px; }

        .header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; padding: 0 10px; }
        .header h2 { margin: 0; font-weight: 700; letter-spacing: 1px; }

        .notif-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px);
            border-radius: 20px; padding: 18px; border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 12px; display: flex; align-items: center; gap: 15px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .icon-circle {
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }

        .like-bg { background: rgba(255, 75, 75, 0.25); color: #ff4d4d; border: 1px solid rgba(255, 75, 75, 0.3); }
        .comment-bg { background: rgba(50, 150, 255, 0.25); color: #3498db; border: 1px solid rgba(50, 150, 255, 0.3); }
        .follow-bg { background: rgba(253, 187, 45, 0.25); color: #fdbb2d; border: 1px solid rgba(253, 187, 45, 0.3); }

        .content { flex-grow: 1; }
        .user-name { color: #fdbb2d; font-weight: 700; cursor: pointer; }
        .notif-text { font-size: 14px; opacity: 0.9; }
        .time { font-size: 11px; opacity: 0.5; display: block; margin-top: 5px; }

        .nav-bottom {
            position: fixed; bottom: 20px; width: 90%; max-width: 400px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 15px 30px; display: flex;
            justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { color: white; opacity: 0.6; font-size: 20px; text-decoration: none; }
        .active { opacity: 1; color: #fdbb2d; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <i class="fas fa-chevron-left" onclick="history.back()" style="cursor:pointer; font-size: 20px;"></i>
            <h2>Activity</h2>
        </div>

        <div id="notif-feed">
            </div>
    </div>

    <nav class="nav-bottom">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="search.html" class="nav-item"><i class="fas fa-search"></i></a>
        <a href="chat.html" class="nav-item"><i class="fas fa-comment-alt"></i></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i></a>
    </nav>

    <script>
        const myName = localStorage.getItem('vault_username');

        async function fetchNotifications() {
            try {
                // Fetching all-time history for this user
                const res = await fetch(`/api/notifications/${myName}`);
                const data = await res.json();
                const feed = document.getElementById('notif-feed');

                if (data.length === 0) {
                    feed.innerHTML = '<div style="text-align:center; margin-top:50px; opacity:0.5;">The Vault is quiet...</div>';
                    return;
                }

                feed.innerHTML = data.map(n => {
                    let icon = 'fa-heart'; let bgClass = 'like-bg'; let msg = 'liked your post';
                    if (n.type === 'comment') { icon = 'fa-comment'; bgClass = 'comment-bg'; msg = 'commented on your post'; }
                    if (n.type === 'follow') { icon = 'fa-user-plus'; bgClass = 'follow-bg'; msg = 'started following you'; }

                    return `
                        <div class="notif-card">
                            <div class="icon-circle ${bgClass}"><i class="fas ${icon}"></i></div>
                            <div class="content">
                                <span class="notif-text">
                                    <span class="user-name" onclick="window.location.href='profile.html?user=${n.fromUser}'">${n.fromUser}</span> 
                                    ${msg}
                                </span>
                                <span class="time">${new Date(n.timestamp).toLocaleString([], { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' })}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error("Notif Error:", err);
            }
        }

        fetchNotifications();
    </script>
</body>
</html>
