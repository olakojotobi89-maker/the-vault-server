<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vault | Discover</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%); }
        body { 
            margin: 0; padding: 0; min-height: 100dvh; 
            background: var(--primary-gradient); 
            font-family: -apple-system, sans-serif; color: white; 
        }
        .container { width: 95%; max-width: 500px; margin: auto; padding: 20px 0 100px; }

        /* Instagram Style Search Bar */
        .search-container {
            position: sticky; top: 10px; z-index: 100;
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(25px);
            border-radius: 15px; padding: 12px 18px;
            display: flex; align-items: center; gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2); margin-bottom: 25px;
        }
        .search-container input {
            flex: 1; background: none; border: none; color: white;
            font-size: 16px; outline: none;
        }
        .search-container input::placeholder { color: rgba(255,255,255,0.6); }

        /* User List Style */
        .user-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 10px; transition: 0.2s; cursor: pointer;
            border-radius: 15px;
        }
        .user-item:active { background: rgba(255, 255, 255, 0.1); }

        .user-meta { display: flex; align-items: center; gap: 15px; }
        
        /* Profile Image logic */
        .pfp-circle {
            width: 55px; height: 55px; border-radius: 50%;
            background: #222; border: 2px solid #fdbb2d;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; object-fit: cover;
        }
        .pfp-circle img { width: 100%; height: 100%; object-fit: cover; }

        .username-text { font-weight: 700; font-size: 15px; display: block; }
        .sub-text { font-size: 12px; opacity: 0.6; }

        .follow-btn {
            background: white; color: black; border: none;
            padding: 7px 20px; border-radius: 10px;
            font-size: 13px; font-weight: 700;
        }

        .nav-bottom {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 15px 30px; display: flex;
            justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item { color: white; opacity: 0.5; font-size: 20px; text-decoration: none; }
        .active { opacity: 1; color: #fdbb2d; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="padding-left: 10px; margin-bottom: 20px;">Explore</h2>
        
        <div class="search-container">
            <i class="fas fa-search" style="opacity: 0.6;"></i>
            <input type="text" id="userSearch" placeholder="Search users..." oninput="doSearch()">
        </div>

        <div id="results">
            </div>
    </div>

    <nav class="nav-bottom">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="search.html" class="nav-item active"><i class="fas fa-search"></i></a>
        <a href="chat.html" class="nav-item"><i class="fas fa-comment-alt"></i></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i></a>
    </nav>

    <script>
        async function doSearch() {
            const q = document.getElementById('userSearch').value;
            const resultsDiv = document.getElementById('results');

            if (q.length < 1) {
                resultsDiv.innerHTML = '';
                return;
            }

            try {
                const res = await fetch(`/api/users/search?q=${q}`);
                const users = await res.json();

                resultsDiv.innerHTML = users.map(user => {
                    // Check if they have a real profile pic, otherwise show first letter
                    const avatar = user.profilePic 
                        ? `<img src="${user.profilePic}">` 
                        : `<span style="font-size:20px; color:#fdbb2d;">${user.username[0].toUpperCase()}</span>`;

                    return `
                        <div class="user-item" onclick="window.location.href='profile.html?user=${user.username}'">
                            <div class="user-meta">
                                <div class="pfp-circle">${avatar}</div>
                                <div>
                                    <span class="username-text">${user.username} <i class="fas fa-check-circle" style="color:#3897f0; font-size:12px;"></i></span>
                                    <span class="sub-text">Vault Member</span>
                                </div>
                            </div>
                            <button class="follow-btn">View</button>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error("Search failed:", err);
            }
        }
    </script>
</body>
</html>
