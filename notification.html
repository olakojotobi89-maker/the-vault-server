<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vault | Activity</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VaultChat">
    <link rel="apple-touch-icon" href="vault-logo.png">
    <link rel="apple-touch-startup-image" href="vault-logo.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%); }
        
        body { 
            margin: 0; padding: 0; min-height: 100dvh; 
            background: var(--primary-gradient); 
            font-family: -apple-system, sans-serif; color: white; 
        }

        .container { 
            width: 95%; 
            max-width: 500px; 
            margin: auto; 
            padding: 20px 0 120px;
            padding-top: calc(20px + env(safe-area-inset-top)); /* Notch support */
        }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px; margin-bottom: 20px; 
        }
        
        .notif-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border-radius: 18px; padding: 15px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; } }

        .pfp-mini {
            width: 45px; height: 45px; border-radius: 50%;
            background: #222; border: 1.5px solid #fdbb2d;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .pfp-mini img { width: 100%; height: 100%; object-fit: cover; }

        .notif-content { flex: 1; font-size: 14px; }
        .user-link { font-weight: 800; color: #fdbb2d; text-decoration: none; }
        .time-ago { font-size: 11px; opacity: 0.5; display: block; margin-top: 3px; }

        .action-btn {
            background: #fdbb2d; color: black; border: none;
            padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold;
        }

        .nav-bottom {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 15px 30px; display: flex;
            justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1);
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); /* Home bar support */
            z-index: 1000;
        }
        .nav-item { color: white; opacity: 0.6; font-size: 20px; text-decoration: none; }
        .nav-item.active { opacity: 1; color: #fdbb2d; }
    </style>
</head>
<body>

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>

    <div class="container">
        <div class="header">
            <h2 style="margin:0;">Activity</h2>
            <span style="font-size: 12px; opacity: 0.6; cursor: pointer;" onclick="clearNotifications()">Clear All</span>
        </div>

        <div id="notification-list"></div>
    </div>

    <nav class="nav-bottom">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="search.html" class="nav-item"><i class="fas fa-search"></i></a>
        <a href="chat.html" class="nav-item"><i class="fas fa-comment-alt"></i></a>
        <a href="notification.html" class="nav-item active"><i class="fas fa-bell"></i></a>
    </nav>

    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Vault Activity PWA Ready'))
                    .catch(err => console.log('PWA Error', err));
            });
        }

        const myName = localStorage.getItem('vault_username');

        async function loadNotifications() {
            const list = document.getElementById('notification-list');
            try {
                const res = await fetch(`/api/notifications/${myName}`);
                const data = await res.json();

                if (data.length === 0) {
                    list.innerHTML = '<div style="text-align:center; margin-top:100px; opacity:0.4;">No new activity</div>';
                    return;
                }

                list.innerHTML = data.map(n => {
                    let message = "interacted with your vault.";
                    if(n.type === 'like') message = "liked your post.";
                    if(n.type === 'follow') message = "started following you.";

                    return `
                        <div class="notif-card" onclick="window.location.href='profile.html?user=${n.fromUser}'">
                            <div class="pfp-mini">
                                <span>${n.fromUser[0].toUpperCase()}</span>
                            </div>
                            <div class="notif-content">
                                <span class="user-link">${n.fromUser}</span> ${message}
                                <span class="time-ago">${new Date(n.timestamp).toLocaleString()}</span>
                            </div>
                            <button class="action-btn">View</button>
                        </div>
                    `;
                }).join('');
                
                markAsRead();
            } catch (err) { console.error(err); }
        }

        async function markAsRead() {
            try {
                await fetch(`/api/notifications/read/${myName}`, { method: 'POST' });
            } catch (err) { console.error("Could not clear badge:", err); }
        }

        async function clearNotifications() {
            if(!confirm("Clear all activity history?")) return;
            try {
                const res = await fetch(`/api/notifications/${myName}`, { method: 'DELETE' });
                if (res.ok) loadNotifications();
            } catch (err) { console.error(err); }
        }

        loadNotifications();
    </script>
</body>
</html>
