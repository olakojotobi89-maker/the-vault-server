<style>
    /* Add this to your existing styles to make the badge look clean */
    .chat-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition: background 0.3s;
    }
    .chat-item:hover { background: rgba(255, 255, 255, 0.05); }
    
    .chat-info { display: flex; align-items: center; gap: 12px; }
    
    .unread-badge {
        background: #fdbb2d; /* Your primary gold/yellow */
        color: #000;
        font-size: 11px;
        font-weight: bold;
        min-width: 18px;
        height: 18px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 5px;
    }
</style>

<div class="container">
    <h2>Messages</h2>
    <div id="chat-partners-list">
        </div>
</div>

<script>
    const myName = localStorage.getItem('vault_username');

    async function loadChatList() {
        try {
            const res = await fetch(`/api/chat-list/${myName}`);
            const users = await res.json();
            const list = document.getElementById('chat-partners-list');
            
            list.innerHTML = users.map(user => `
                <div class="chat-item" onclick="location.href='direct.html?user=${user.username}'">
                    <div class="chat-info">
                        <img src="${user.profilePic || 'default-pfp.png'}" class="pfp" style="width:45px; height:45px; border-radius:50%; border: 1px solid rgba(255,255,255,0.2);">
                        <span style="font-weight: 500;">${user.username}</span>
                    </div>
                    
                    ${user.unreadCount > 0 ? `
                        <div class="unread-badge">${user.unreadCount}</div>
                    ` : ''}
                </div>
            `).join('');
        } catch (err) {
            console.error("Failed to load inbox:", err);
        }
    }

    // Load immediately and refresh every 10 seconds for real-time feel
    loadChatList();
    setInterval(loadChatList, 10000);
</script>
