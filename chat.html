<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Chat | Active</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: var(--primary-gradient);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        .chat-container {
            width: 95vw; max-width: 450px; height: 92vh;
            background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px; display: flex; flex-direction: column;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.3); position: relative;
        }

        .chat-header {
            padding: 20px; display: flex; justify-content: space-between;
            align-items: center; color: white; background: rgba(0, 0, 0, 0.1);
            border-top-left-radius: 40px; border-top-right-radius: 40px;
        }

        .user-info { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .status-dot { width: 10px; height: 10px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; }
        
        .call-actions { display: flex; gap: 18px; }
        .call-actions i { font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .call-actions i:hover { transform: scale(1.2); color: #00d2ff; }

        .timer-bar {
            background: rgba(0,0,0,0.2); padding: 8px; font-size: 11px;
            color: #00d2ff; text-align: center; text-transform: uppercase; letter-spacing: 1px;
        }

        .chat-messages {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px;
            scrollbar-width: none;
        }
        .chat-messages::-webkit-scrollbar { display: none; }

        .message {
            max-width: 75%; padding: 12px 16px; border-radius: 20px;
            font-size: 14px; line-height: 1.4; position: relative;
            animation: slideUp 0.3s ease; cursor: pointer;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .received { background: white; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        .sent { background: linear-gradient(to right, #00d2ff, #3a7bd5); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        .sent-img { max-width: 100%; border-radius: 15px; margin-top: 5px; display: block; }

        .chat-input-area {
            padding: 15px 20px 30px; background: rgba(0,0,0,0.2);
            display: flex; align-items: center; gap: 12px;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }

        .input-wrapper {
            flex: 1; background: white; border-radius: 25px;
            display: flex; align-items: center; padding: 5px 15px; position: relative;
        }

        .input-wrapper input { border: none; padding: 10px; width: 100%; outline: none; font-size: 15px; color: #333; }

        .media-btn { color: #764ba2; font-size: 1.3rem; cursor: pointer; margin-right: 10px; }
        .mic-btn { color: #555; font-size: 1.2rem; cursor: pointer; }
        
        .send-btn { 
            background: #764ba2; border: none; color: white; width: 45px; height: 45px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .send-btn:active { transform: scale(0.9); }

        .call-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            z-index: 100; display: none; flex-direction: column;
            align-items: center; justify-content: space-around;
            border-radius: 40px; color: white; animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .caller-avatar {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid #00d2ff; background: #333;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; box-shadow: 0 0 30px rgba(0,210,255,0.4);
            animation: pulse-border 2s infinite;
        }
        @keyframes pulse-border {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,210,255,0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(0,210,255,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,210,255,0); }
        }

        .end-call-btn {
            background: #ff4b2b; width: 70px; height: 70px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; cursor: pointer;
        }

        #recording-ui { 
            display: none; position: absolute; left: 50px; 
            align-items: center; gap: 10px; color: #ff4b2b; font-weight: bold; 
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="call-overlay" id="callOverlay">
            <div class="caller-avatar" id="callAvatar">👤</div>
            <div style="text-align: center;">
                <h2 id="callTarget">Private User</h2>
                <p style="letter-spacing: 2px; opacity: 0.7;" id="callLabel">Calling...</p>
            </div>
            <div class="end-call-btn" id="endCall"><i class="fas fa-phone-slash"></i></div>
        </div>

        <div class="chat-header">
            <div class="user-info">
                <div class="status-dot"></div>
                <span id="header-name">Private Duo 🔒</span>
            </div>
            <div class="call-actions">
                <i class="fas fa-phone" onclick="triggerCall('Voice')"></i>
                <i class="fas fa-video" onclick="triggerCall('Video')"></i>
            </div>
        </div>

        <div class="timer-bar">
            <i class="fas fa-clock"></i> Disappearing: 24 Hours
        </div>

        <div class="chat-messages" id="chatBox"></div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <i class="fas fa-camera media-btn" id="camBtn"></i>
                <input type="file" id="fileInput" accept="image/*" hidden>
                <input type="text" placeholder="Message..." id="msgInput">
                <div id="recording-ui">
                    <i class="fas fa-circle"></i> Rec <span id="timer">0:00</span>
                </div>
                <i class="fas fa-microphone mic-btn" id="micBtn"></i>
            </div>
            <button class="send-btn" id="sendBtn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const targetUser = urlParams.get('user') || 'Private User';
        const loggedInUser = localStorage.getItem('vault_username');
        const chatBox = document.getElementById('chatBox');

        // Initial UI Setup
        document.getElementById('header-name').innerText = `${targetUser} 🔒`;
        document.getElementById('callTarget').innerText = targetUser;
        document.getElementById('callAvatar').innerText = targetUser.charAt(0).toUpperCase();

        // Join private socket room
        socket.emit('join_private', loggedInUser);

        // --- 1. PERSISTENT HISTORY LOADER ---
        async function loadHistory() {
            try {
                const res = await fetch(`/api/chat/${loggedInUser}/${targetUser}`);
                const history = await res.json();
                chatBox.innerHTML = ""; // Clear loader
                history.forEach(msg => {
                    appendMessage(msg.content, msg.sender === loggedInUser ? 'sent' : 'received', msg.type === 'image', msg._id);
                });
            } catch (err) { console.error("History error:", err); }
        }

        // --- 2. MESSAGING LOGIC ---
        function appendMessage(content, type = 'sent', isImage = false, id = null) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            if (id) msg.setAttribute('data-id', id);
            
            if (isImage) {
                msg.innerHTML = `<img src="${content}" class="sent-img">`;
            } else {
                msg.innerText = content;
            }
            
            // Delete Feature (Hold to delete)
            if (type === 'sent') {
                let pressTimer;
                const start = () => pressTimer = setTimeout(() => deleteMessage(id, msg), 800);
                const cancel = () => clearTimeout(pressTimer);
                
                msg.addEventListener('mousedown', start);
                msg.addEventListener('mouseup', cancel);
                msg.addEventListener('touchstart', start);
                msg.addEventListener('touchend', cancel);
            }

            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function deleteMessage(id, el) {
            if (!id || !confirm("Delete this message?")) return;
            try {
                const res = await fetch(`/api/chat/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: loggedInUser })
                });
                if (res.ok) el.remove();
            } catch (err) { alert("Delete failed"); }
        }

        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            socket.emit('send_message', { 
                sender: loggedInUser, 
                receiver: targetUser, 
                content: text, 
                type: 'text' 
            });
            msgInput.value = "";
        }

        socket.on('receive_message', (data) => {
            if ((data.sender === targetUser && data.receiver === loggedInUser) || 
                (data.sender === loggedInUser && data.receiver === targetUser)) {
                appendMessage(data.content, data.sender === loggedInUser ? 'sent' : 'received', data.type === 'image', data._id);
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        // --- 3. MEDIA HANDLERS ---
        const fileInput = document.getElementById('fileInput');
        document.getElementById('camBtn').onclick = () => fileInput.click();
        
        fileInput.onchange = function() {
            const reader = new FileReader();
            reader.onload = () => {
                socket.emit('send_message', { 
                    sender: loggedInUser, 
                    receiver: targetUser, 
                    content: reader.result, 
                    type: 'image' 
                });
            };
            reader.readAsDataURL(this.files[0]);
        };

        // --- 4. CALL & VOICE LOGIC ---
        function triggerCall(type) {
            document.getElementById('callLabel').innerText = `${type} Calling...`;
            document.getElementById('callOverlay').style.display = 'flex';
        }
        document.getElementById('endCall').onclick = () => document.getElementById('callOverlay').style.display = 'none';

        let timerInterval, sec = 0;
        const micBtn = document.getElementById('micBtn');
        const recUI = document.getElementById('recording-ui');

        function startRec() { 
            msgInput.style.visibility = 'hidden'; 
            recUI.style.display = 'flex';
            sec = 0;
            timerInterval = setInterval(() => { sec++; document.getElementById('timer').innerText = `0:${sec < 10 ? '0' : ''}${sec}`; }, 1000);
        }
        function stopRec() { 
            clearInterval(timerInterval); 
            msgInput.style.visibility = 'visible'; 
            recUI.style.display = 'none';
            if(sec > 0) socket.emit('send_message', { sender: loggedInUser, receiver: targetUser, content: `<i class="fas fa-play"></i> Voice Note (${sec}s)`, type: 'text' });
        }

        micBtn.onmousedown = startRec; micBtn.onmouseup = stopRec;
        micBtn.ontouchstart = (e) => { e.preventDefault(); startRec(); }; micBtn.ontouchend = (e) => { e.preventDefault(); stopRec(); };

        // Load History on Start
        loadHistory();
    </script>
</body>
</html>
