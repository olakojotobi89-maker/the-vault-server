<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vault | Conversations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            background: var(--primary-gradient);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; 
        }

        .main-wrapper {
            width: 100%; 
            height: 100dvh; /* Dynamic viewport height for mobile */
            display: flex; 
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
            position: relative;
        }

        /* --- SIDEBAR --- */
        .inbox-sidebar {
            width: 320px; 
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; 
            background: rgba(0,0,0,0.4);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
        }

        .inbox-header { 
            padding: 20px; 
            font-weight: 800; 
            font-size: 1.5rem; 
            color: white; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        
        .user-list { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .user-list::-webkit-scrollbar { display: none; }
        
        .user-item {
            padding: 15px 20px; display: flex; align-items: center; gap: 12px;
            cursor: pointer; color: white; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .user-item.active { background: rgba(255,255,255,0.1); border-left: 4px solid #fdbb2d; }
        
        .user-avatar { 
            width: 45px; height: 45px; background: white; border-radius: 50%; 
            color: #333; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; overflow: hidden; flex-shrink: 0;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* --- CHAT AREA --- */
        .chat-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            position: relative;
        }

        .chat-header { 
            padding: env(safe-area-inset-top) 16px 12px 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(0,0,0,0.5); 
            color: white;
            backdrop-filter: blur(10px);
            min-height: 60px;
        }
        
        .chat-messages { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            scrollbar-width: none;
        }
        .chat-messages::-webkit-scrollbar { display: none; }

        .message { 
            max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 15px; 
            color: white; display: flex; align-items: flex-end; gap: 8px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }
        .sent { align-self: flex-end; background: #004a99; border-bottom-right-radius: 2px; flex-direction: row-reverse; }
        .received { align-self: flex-start; background: rgba(255,255,255,0.15); border-bottom-left-radius: 2px; }
        
        .msg-pfp { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }

        /* --- INPUT BAR --- */
        .chat-input-area { 
            padding: 12px 16px; 
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background: rgba(0,0,0,0.6);
            display: flex; 
            gap: 10px; 
            align-items: center;
        }

        .input-box { 
            flex: 1; background: white; border-radius: 25px; 
            padding: 2px 15px; display: flex; align-items: center; 
        }
        .input-box input { 
            border: none; outline: none; flex: 1; padding: 10px; 
            font-size: 16px; /* Prevents auto-zoom on iOS */
            background: transparent;
        }
        
        .send-btn {
            background: #fdbb2d; border: none; width: 45px; height: 45px; 
            border-radius: 50%; cursor: pointer; color: #333; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .inbox-sidebar { 
                position: absolute; width: 100%; height: 100%; 
                left: 0; top: 0; transform: translateX(0);
            }
            .inbox-sidebar.hidden { transform: translateX(-100%); }
            .message { max-width: 85%; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="inbox-sidebar" id="sidebar">
        <div class="inbox-header">Vault</div>
        <div class="user-list" id="user-list"></div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chat-header" style="visibility: hidden;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size: 1.3rem; cursor:pointer;"><i class="fas fa-bars"></i></button>
                <div id="header-pfp" class="user-avatar" style="width:35px; height:35px; font-size: 0.9rem;"></div>
                <div id="header-name" style="font-weight: 600;">User</div>
            </div>
            <div id="blockBtn" onclick="handleBlock()" style="color: #ff4b2b; font-weight: bold; font-size: 0.8rem; cursor: pointer;">BLOCK</div>
        </div>

        <div class="chat-messages" id="chatBox">
            <div id="welcome-msg" style="margin: auto; text-align: center; color: white; opacity: 0.5;">
                <i class="fas fa-shield-alt" style="font-size: 3.5rem; margin-bottom: 10px;"></i>
                <h3>Vault Secure Chat</h3>
                <p>Select a contact to begin</p>
            </div>
        </div>

        <div class="chat-input-area" id="input-area" style="display: none;">
            <div class="input-box">
                <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off" onkeypress="if(event.key === 'Enter') sendMessage()">
                <i class="fas fa-microphone" id="micBtn" style="color: #666; cursor: pointer;"></i>
            </div>
            <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const socket = io();
    const loggedInUser = localStorage.getItem('vault_username');
    let activeChat = null;
    let activeChatPFP = ""; 
    let isBlocked = false;

    if (loggedInUser) socket.emit('join_private', loggedInUser);

    async function loadFriends() {
        const res = await fetch(`/api/profile/${loggedInUser}`);
        const user = await res.json();
        const listDiv = document.getElementById('user-list');
        listDiv.innerHTML = "";
        const friends = [...new Set([...user.following, ...user.followers])];

        for (const fName of friends) {
            if(fName === loggedInUser) continue;
            const fRes = await fetch(`/api/profile/${fName}`);
            const fData = await fRes.json();
            const pfp = fData.profilePic ? `<img src="${fData.profilePic}">` : fName[0].toUpperCase();

            const item = document.createElement('div');
            item.className = `user-item ${activeChat === fName ? 'active' : ''}`;
            item.innerHTML = `<div class="user-avatar">${pfp}</div><div style="font-weight:500;">${fName}</div>`;
            item.onclick = () => selectUser(fName, fData.profilePic);
            listDiv.appendChild(item);
        }
    }

    async function selectUser(username, pfpUrl) {
        activeChat = username;
        activeChatPFP = pfpUrl;
        document.getElementById('header-pfp').innerHTML = pfpUrl ? `<img src="${pfpUrl}">` : username[0].toUpperCase();
        document.getElementById('header-name').innerText = username;
        document.getElementById('chat-header').style.visibility = 'visible';
        document.getElementById('input-area').style.display = 'flex';
        
        const res = await fetch(`/api/profile/${loggedInUser}`);
        const me = await res.json();
        isBlocked = me.blockedUsers.includes(username);
        updateBlockUI();

        loadChatHistory();
        if(window.innerWidth <= 768) toggleSidebar();
    }

    async function loadChatHistory() {
        const res = await fetch(`/api/chat/${loggedInUser}/${activeChat}`);
        const messages = await res.json();
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = "";
        messages.forEach(msg => appendMessage(msg));
    }

    function appendMessage(msg) {
        const chatBox = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `message ${msg.sender === loggedInUser ? 'sent' : 'received'}`;
        
        const pfp = (msg.sender !== loggedInUser) 
            ? (activeChatPFP ? `<img src="${activeChatPFP}" class="msg-pfp">` : `<div class="msg-pfp" style="background:white; color:#333; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold;">${activeChat[0]}</div>`)
            : "";

        div.innerHTML = `${pfp} <span>${msg.content}</span>`;
        
        div.oncontextmenu = (e) => {
            e.preventDefault();
            if(msg.sender === loggedInUser && confirm("Delete message?")) deleteMsg(msg._id, div);
        };

        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        if(!input.value.trim() || !activeChat) return;
        socket.emit('send_message', { sender: loggedInUser, receiver: activeChat, content: input.value, type: 'text' });
        input.value = "";
    }

    async function deleteMsg(id, el) {
        await fetch('/api/delete-message', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ messageId: id, username: loggedInUser })
        });
        el.remove();
    }

    async function handleBlock() {
        const res = await fetch('/api/block-user', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ myUsername: loggedInUser, targetUsername: activeChat })
        });
        const data = await res.json();
        isBlocked = data.isBlocked;
        updateBlockUI();
    }

    function updateBlockUI() {
        const btn = document.getElementById('blockBtn');
        btn.innerText = isBlocked ? "UNBLOCK" : "BLOCK";
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }

    socket.on('receive_message', (data) => {
        if((data.sender === activeChat && data.receiver === loggedInUser) || (data.sender === loggedInUser && data.receiver === activeChat)) {
            appendMessage(data);
        }
    });

    loadFriends();
</script>
</body>
</html>
