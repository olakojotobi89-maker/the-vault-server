<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault | Conversations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background: var(--primary-gradient);
            font-family: -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        .main-wrapper {
            width: 98vw; height: 95vh; max-width: 1000px;
            display: flex; background: rgba(0,0,0,0.3);
            backdrop-filter: blur(20px); border-radius: 30px;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- SIDEBAR / INBOX --- */
        .inbox-sidebar {
            width: 300px; border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; background: rgba(0,0,0,0.2);
        }
        .inbox-header { padding: 20px; font-weight: bold; font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); color: white; }
        
        .user-list { flex: 1; overflow-y: auto; }
        .user-item {
            padding: 15px 20px; display: flex; align-items: center; gap: 12px;
            cursor: pointer; transition: 0.3s; color: white; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .user-item:hover { background: rgba(255,255,255,0.1); }
        .user-item.active { background: rgba(255,255,255,0.2); border-left: 4px solid #fdbb2d; }
        .user-avatar { width: 45px; height: 45px; background: #eee; border-radius: 50%; color: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* --- CHAT AREA --- */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: rgba(255,255,255,0.05); position: relative; }
        .chat-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); color: white; }
        
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 14px; position: relative; color: white; }
        .sent { align-self: flex-end; background: #004a99; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: rgba(255,255,255,0.2); border-bottom-left-radius: 2px; }

        .chat-input-area { padding: 20px; display: flex; gap: 10px; align-items: center; }
        .input-box { flex: 1; background: white; border-radius: 25px; padding: 10px 20px; display: flex; align-items: center; }
        .input-box input { border: none; outline: none; width: 100%; font-size: 14px; }
        
        .block-btn { color: #ff4b2b; font-size: 0.8rem; cursor: pointer; border: 1px solid #ff4b2b; padding: 5px 10px; border-radius: 10px; }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .inbox-sidebar { width: 100%; position: absolute; z-index: 10; height: 100%; transition: 0.3s; }
            .inbox-sidebar.hidden { transform: translateX(-100%); }
            .chat-area { width: 100%; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="inbox-sidebar" id="sidebar">
        <div class="inbox-header">Messages</div>
        <div class="user-list" id="user-list">
            <p style="text-align: center; opacity: 0.5; padding: 20px;">Loading friends...</p>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <button onclick="toggleSidebar()" id="backToInbox" style="display:none; background:none; border:none; color:white;"><i class="fas fa-chevron-left"></i></button>
                <div id="header-name" style="font-weight: bold;">Select a chat</div>
            </div>
            <div id="block-zone" style="display: none;">
                <span class="block-btn" onclick="toggleBlock()">Block User</span>
            </div>
        </div>

        <div class="chat-messages" id="chatBox">
            <div style="margin: auto; text-align: center; opacity: 0.5;">
                <i class="fas fa-lock" style="font-size: 3rem; margin-bottom: 10px;"></i>
                <p>Private Vault Encryption Active</p>
            </div>
        </div>

        <div class="chat-input-area" id="input-area" style="display: none;">
            <div class="input-box">
                <input type="text" id="msgInput" placeholder="Write a message...">
                <i class="fas fa-microphone" id="micBtn" style="color: #666; cursor: pointer;"></i>
            </div>
            <button onclick="sendMessage()" style="background:#fdbb2d; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer;">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
    const socket = io();
    const loggedInUser = localStorage.getItem('vault_username');
    let activeChat = null;

    // 1. Load your following list (Friends)
    async function loadFriends() {
        const res = await fetch(`/api/profile/${loggedInUser}`);
        const data = await res.json();
        const listDiv = document.getElementById('user-list');
        listDiv.innerHTML = "";

        data.following.forEach(friend => {
            const item = document.createElement('div');
            item.className = 'user-item';
            item.innerHTML = `
                <div class="user-avatar">${friend.charAt(0).toUpperCase()}</div>
                <div>${friend}</div>
            `;
            item.onclick = () => selectUser(friend);
            listDiv.appendChild(item);
        });
    }

    // 2. Switch to a specific user
    async function selectUser(username) {
        activeChat = username;
        document.getElementById('header-name').innerText = username;
        document.getElementById('input-area').style.display = 'flex';
        document.getElementById('block-zone').style.display = 'block';
        
        if(window.innerWidth < 768) toggleSidebar(); // Hide sidebar on mobile

        socket.emit('join_private', loggedInUser);
        loadChatHistory();
    }

    async function loadChatHistory() {
        const res = await fetch(`/api/chat/${loggedInUser}/${activeChat}`);
        const history = await res.json();
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = "";
        history.forEach(msg => {
            appendMessage(msg.content, msg.sender === loggedInUser ? 'sent' : 'received');
        });
    }

    function appendMessage(content, type) {
        const chatBox = document.getElementById('chatBox');
        const msg = document.createElement('div');
        msg.className = `message ${type}`;
        msg.innerText = content;
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        if(!input.value.trim() || !activeChat) return;
        
        socket.emit('send_message', {
            sender: loggedInUser,
            receiver: activeChat,
            content: input.value,
            type: 'text'
        });
        input.value = "";
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('hidden');
        document.getElementById('backToInbox').style.display = 
            document.getElementById('sidebar').classList.contains('hidden') ? 'block' : 'none';
    }

    // BLOCK LOGIC
    async function toggleBlock() {
        if(!confirm(`Block ${activeChat}? You will no longer receive messages.`)) return;
        // Add your block API call here
        alert(`${activeChat} has been blocked.`);
    }

    loadFriends();
</script>

</body>
</html>
