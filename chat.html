<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Chat | Active</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: var(--primary-gradient);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        .chat-container {
            width: 95vw; max-width: 450px; height: 92vh;
            background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px; display: flex; flex-direction: column;
            box-shadow: 0 40px 60px rgba(0, 0, 0, 0.3); position: relative;
        }

        .chat-header {
            padding: 20px; display: flex; justify-content: space-between;
            align-items: center; color: white; background: rgba(0, 0, 0, 0.1);
            border-top-left-radius: 40px; border-top-right-radius: 40px;
        }

        .user-info { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .status-dot { width: 10px; height: 10px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; }
        
        .call-actions { display: flex; gap: 18px; }
        .call-actions i { font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .call-actions i:hover { transform: scale(1.2); color: #00d2ff; }

        .timer-bar {
            background: rgba(0,0,0,0.2); padding: 8px; font-size: 11px;
            color: #00d2ff; text-align: center; text-transform: uppercase; letter-spacing: 1px;
        }

        .chat-messages {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 12px;
            scrollbar-width: none;
        }
        .chat-messages::-webkit-scrollbar { display: none; }

        .message {
            max-width: 75%; padding: 12px 16px; border-radius: 20px;
            font-size: 14px; line-height: 1.4; position: relative;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .received { background: white; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        .sent { background: linear-gradient(to right, #00d2ff, #3a7bd5); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        /* Tick Styling */
        .tick { font-size: 10px; margin-left: 5px; opacity: 0.5; transition: 0.3s; }
        .tick.seen { color: #00d2ff !important; opacity: 1 !important; }

        .sent-img { max-width: 100%; border-radius: 15px; margin-top: 5px; display: block; }

        .voice-note-ui { display: flex; align-items: center; gap: 10px; min-width: 140px; cursor: pointer; padding: 5px 0; }
        .vn-play-btn { font-size: 1.2rem; }
        .vn-track { flex: 1; height: 3px; background: rgba(0,0,0,0.1); border-radius: 2px; position: relative; }
        .sent .vn-track { background: rgba(255,255,255,0.3); }
        .vn-progress { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: #764ba2; border-radius: 2px; }
        .sent .vn-progress { background: white; }

        .chat-input-area {
            padding: 15px 20px 30px; background: rgba(0,0,0,0.2);
            display: flex; align-items: center; gap: 12px;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }

        .input-wrapper {
            flex: 1; background: white; border-radius: 25px;
            display: flex; align-items: center; padding: 5px 15px; position: relative;
        }

        .input-wrapper input { border: none; padding: 10px; width: 100%; outline: none; font-size: 15px; color: #333; }

        .media-btn { color: #764ba2; font-size: 1.3rem; cursor: pointer; margin-right: 10px; }
        .mic-btn { color: #555; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .mic-btn.active { color: #ff4b2b; transform: scale(1.3); }
        
        .send-btn { 
            background: #764ba2; border: none; color: white; width: 45px; height: 45px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }

        .call-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            z-index: 100; display: none; flex-direction: column;
            align-items: center; justify-content: space-around;
            border-radius: 40px; color: white; animation: fadeIn 0.4s ease;
        }

        #recording-ui { 
            display: none; position: absolute; left: 50px; 
            align-items: center; gap: 10px; color: #ff4b2b; font-weight: bold; 
            background: white; width: calc(100% - 100px);
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="call-overlay" id="callOverlay">
            <div class="caller-avatar" id="callAvatar">👤</div>
            <div style="text-align: center;">
                <h2 id="callTarget">Private User</h2>
                <p style="letter-spacing: 2px; opacity: 0.7;" id="callLabel">Calling...</p>
            </div>
            <div class="end-call-btn" id="endCall" style="background: #ff4b2b; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer;">
                <i class="fas fa-phone-slash"></i>
            </div>
        </div>

        <div class="chat-header">
            <div class="user-info">
                <div class="status-dot"></div>
                <span id="header-name">Private Duo 🔒</span>
            </div>
            <div class="call-actions">
                <i class="fas fa-phone" onclick="triggerCall('Voice')"></i>
                <i class="fas fa-video" onclick="triggerCall('Video')"></i>
            </div>
        </div>

        <div class="timer-bar">
            <i class="fas fa-clock"></i> Disappearing: 24 Hours
        </div>

        <div class="chat-messages" id="chatBox"></div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <i class="fas fa-camera media-btn" id="camBtn"></i>
                <input type="file" id="fileInput" accept="image/*" hidden>
                <input type="text" placeholder="Message..." id="msgInput">
                <div id="recording-ui">
                    <i class="fas fa-circle" style="animation: pulse 1s infinite;"></i> Rec <span id="timer">0:00</span>
                </div>
                <i class="fas fa-microphone mic-btn" id="micBtn"></i>
            </div>
            <button class="send-btn" id="sendBtn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const targetUser = urlParams.get('user') || 'Private User';
        const loggedInUser = localStorage.getItem('vault_username');
        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const micBtn = document.getElementById('micBtn');
        const recUI = document.getElementById('recording-ui');

        document.getElementById('header-name').innerText = `${targetUser} 🔒`;
        document.getElementById('callTarget').innerText = targetUser;
        document.getElementById('callAvatar').innerText = targetUser.charAt(0).toUpperCase();

        socket.emit('join_private', loggedInUser);

        async function markAsRead() {
            try {
                await fetch('/api/chat/read', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reader: loggedInUser, sender: targetUser })
                });
                socket.emit('mark_read', { reader: loggedInUser, sender: targetUser });
            } catch (err) { console.error("Mark read error:", err); }
        }

        async function loadHistory() {
            try {
                const res = await fetch(`/api/chat/${loggedInUser}/${targetUser}`);
                const history = await res.json();
                chatBox.innerHTML = "";
                history.forEach(msg => {
                    appendMessage(msg.content, msg.sender === loggedInUser ? 'sent' : 'received', msg.type, msg._id, msg.seen);
                });
                markAsRead(); // Mark existing messages as read when you enter the chat
            } catch (err) { console.error("History error:", err); }
        }

        function appendMessage(content, type = 'sent', msgType = 'text', id = null, seen = false) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            if (id) msg.setAttribute('data-id', id);
            
            let htmlBody = "";
            if (msgType === 'image') {
                htmlBody = `<img src="${content}" class="sent-img">`;
            } else if (msgType === 'voice') {
                htmlBody = `
                    <div class="voice-note-ui" onclick="playVoice(this, '${content}')">
                        <i class="fas fa-play vn-play-btn"></i>
                        <div class="vn-track"><div class="vn-progress"></div></div>
                    </div>
                `;
            } else {
                htmlBody = `<span>${content}</span>`;
            }

            // Ticks only for sent messages
            const ticks = type === 'sent' ? `<i class="fas fa-check-double tick ${seen ? 'seen' : ''}"></i>` : '';
            
            msg.innerHTML = htmlBody + ticks;
            
            // Delete Logic
            if (type === 'sent') {
                let pressTimer;
                const start = () => pressTimer = setTimeout(() => deleteMessage(id, msg), 800);
                const cancel = () => clearTimeout(pressTimer);
                msg.addEventListener('mousedown', start); msg.addEventListener('mouseup', cancel);
                msg.addEventListener('touchstart', start); msg.addEventListener('touchend', cancel);
            }

            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // When receiver views messages, sender's ticks turn blue
        socket.on('messages_viewed', (data) => {
            if (data.viewer === targetUser) {
                document.querySelectorAll('.tick').forEach(tick => tick.classList.add('seen'));
            }
        });

        function playVoice(el, base64) {
            const audio = new Audio(base64);
            const playBtn = el.querySelector('.vn-play-btn');
            const progress = el.querySelector('.vn-progress');

            playBtn.className = 'fas fa-pause vn-play-btn';
            audio.play();

            audio.ontimeupdate = () => {
                const pct = (audio.currentTime / audio.duration) * 100;
                progress.style.width = pct + '%';
            };

            audio.onended = () => {
                playBtn.className = 'fas fa-play vn-play-btn';
                progress.style.width = '0%';
            };
        }

        // --- VOICE RECORDING LOGIC ---
        let mediaRecorder;
        let audioChunks = [];
        let timerInterval, sec = 0;

        async function startRec() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        socket.emit('send_message', { 
                            sender: loggedInUser, receiver: targetUser, 
                            content: reader.result, type: 'voice' 
                        });
                    };
                    stream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                sec = 0;
                msgInput.style.visibility = 'hidden';
                recUI.style.display = 'flex';
                micBtn.classList.add('active');
                timerInterval = setInterval(() => {
                    sec++;
                    document.getElementById('timer').innerText = `0:${sec < 10 ? '0' : ''}${sec}`;
                }, 1000);
            } catch (err) { alert("Mic permission denied"); }
        }

        function stopRec() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                clearInterval(timerInterval);
                msgInput.style.visibility = 'visible';
                recUI.style.display = 'none';
                micBtn.classList.remove('active');
            }
        }

        micBtn.onmousedown = startRec; micBtn.onmouseup = stopRec;
        micBtn.ontouchstart = (e) => { e.preventDefault(); startRec(); }; 
        micBtn.ontouchend = (e) => { e.preventDefault(); stopRec(); };

        // --- STANDARD MESSAGING ---
        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            socket.emit('send_message', { sender: loggedInUser, receiver: targetUser, content: text, type: 'text' });
            msgInput.value = "";
        }

        async function deleteMessage(id, el) {
            if (!id || !confirm("Delete this message?")) return;
            try {
                const res = await fetch(`/api/chat/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: loggedInUser })
                });
                if (res.ok) el.remove();
            } catch (err) { alert("Delete failed"); }
        }

        socket.on('receive_message', (data) => {
            if ((data.sender === targetUser && data.receiver === loggedInUser) || 
                (data.sender === loggedInUser && data.receiver === targetUser)) {
                appendMessage(data.content, data.sender === loggedInUser ? 'sent' : 'received', data.type, data._id, data.seen);
                if (data.sender === targetUser) markAsRead(); // Mark as read if you are viewing it live
            }
        });

        document.getElementById('sendBtn').onclick = sendMessage;
        msgInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        const fileInput = document.getElementById('fileInput');
        document.getElementById('camBtn').onclick = () => fileInput.click();
        fileInput.onchange = function() {
            const reader = new FileReader();
            reader.onload = () => socket.emit('send_message', { sender: loggedInUser, receiver: targetUser, content: reader.result, type: 'image' });
            reader.readAsDataURL(this.files[0]);
        };

        function triggerCall(type) {
            document.getElementById('callLabel').innerText = `${type} Calling...`;
            document.getElementById('callOverlay').style.display = 'flex';
        }
        document.getElementById('endCall').onclick = () => document.getElementById('callOverlay').style.display = 'none';

        loadHistory();
    </script>
</body>
</html>
