<div class="container">
    <h2>Messages</h2>
    <div id="chat-partners-list">
        </div>
</div>

<script>
    async function loadChatList() {
        const res = await fetch(`/api/chat-list/${myName}`);
        const users = await res.json();
        const list = document.getElementById('chat-partners-list');
        
        list.innerHTML = users.map(user => `
            <div class="chat-item" onclick="location.href='direct.html?user=${user.username}'">
                <img src="${user.profilePic || 'default-pfp.png'}" class="pfp">
                <span>${user.username}</span>
            </div>
        `).join('');
    }
    loadChatList();
</script>
