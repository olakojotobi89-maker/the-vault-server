<script>
    const myName = localStorage.getItem('vault_username');

    function toggleModal(show) {
        document.getElementById('groupModal').style.display = show ? 'flex' : 'none';
    }

    async function createGroup() {
        const name = document.getElementById('groupName').value.trim();
        const description = document.getElementById('groupDesc').value.trim();
        const groupPic = document.getElementById('groupPfp').value.trim();

        if(!name) return alert("Group name required");

        const res = await fetch('/api/groups/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            // We send an empty array; the server logic already does [admin, ...members]
            body: JSON.stringify({ name, description, groupPic, admin: myName, members: [] })
        });

        if(res.ok) {
            alert("Group Created! Go to Group Info inside the chat to add members.");
            toggleModal(false);
            loadChatList();
        }
    }

    async function loadFriends() {
        try {
            const res = await fetch(`/api/profile/${myName}`);
            const data = await res.json();
            const friendsList = document.getElementById('friends-list');
            const following = data.following || [];

            if (following.length === 0) {
                friendsList.innerHTML = '<div style="font-size:10px; opacity:0.5; padding:10px;">Not following anyone</div>';
                return;
            }

            friendsList.innerHTML = (await Promise.all(following.map(async username => {
                const userRes = await fetch(`/api/profile/${username}`);
                const user = await userRes.json();
                return `
                    <div class="friend-item" onclick="location.href='direct.html?user=${username}'">
                        <div class="pfp-circle">
                            ${user.profilePic ? `<img src="${user.profilePic}">` : username[0].toUpperCase()}
                        </div>
                        <div style="font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${username}</div>
                    </div>
                `;
            }))).join('');
        } catch (err) { console.error(err); }
    }

    async function loadChatList() {
        try {
            const [dmRes, groupRes] = await Promise.all([
                fetch(`/api/chat-list/${myName}`),
                fetch(`/api/groups/my-groups/${myName}`)
            ]);
            
            const dms = await dmRes.json();
            const groups = await groupRes.json();
            const list = document.getElementById('chat-partners-list');
            let html = '';

            // Render Groups (This shows for anyone in the 'members' list)
            groups.forEach(group => {
                html += `
                    <div class="chat-item" onclick="location.href='direct.html?groupId=${group._id}'">
                        <div class="chat-info">
                            <div class="pfp" style="border-color: #00ff88;">
                                ${group.groupPic ? `<img src="${group.groupPic}">` : `<i class="fas fa-users"></i>`}
                            </div>
                            <div>
                                <div style="font-weight: 600;">${group.name}</div>
                                <div style="font-size: 10px; opacity: 0.5;">${group.members.length} Members</div>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right" style="opacity: 0.2; font-size: 12px;"></i>
                    </div>
                `;
            });

            // Render DMs
            dms.forEach(user => {
                html += `
                    <div class="chat-item" onclick="location.href='direct.html?user=${user.username}'">
                        <div class="chat-info">
                            <div class="pfp">
                                ${user.profilePic ? `<img src="${user.profilePic}">` : user.username[0].toUpperCase()}
                            </div>
                            <span style="font-weight: 600;">${user.username}</span>
                        </div>
                        ${user.unreadCount > 0 ? `<div class="unread-badge">${user.unreadCount}</div>` : '<i class="fas fa-chevron-right" style="opacity: 0.2; font-size: 12px;"></i>'}
                    </div>
                `;
            });

            list.innerHTML = html || `<div style="padding: 40px; text-align: center; opacity: 0.5;">No active chats.</div>`;
        } catch (err) { console.error(err); }
    }

    loadFriends();
    loadChatList();
</script>
