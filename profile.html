<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBNT | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%); }
        body {
            margin: 0; padding: 20px 0; min-height: 100vh;
            display: flex; justify-content: center;
            background: var(--primary-gradient);
            font-family: -apple-system, sans-serif; color: white;
            overflow-x: hidden;
        }
        .profile-container { width: 95%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .profile-header { text-align: center; margin-bottom: 20px; }
        .big-avatar {
            width: 80px; height: 80px; background: rgba(255,255,255,0.2);
            border-radius: 50%; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; border: 2px solid #fdbb2d;
        }
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            text-align: center; margin: 20px 0; border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }
        /* Make stats clickable */
        .stat-box { cursor: pointer; transition: 0.3s; border-radius: 15px; padding: 5px; }
        .stat-box:hover { background: rgba(255,255,255,0.1); }
        .stat-val { font-weight: bold; font-size: 18px; display: block; }
        .stat-label { font-size: 12px; opacity: 0.7; }
        
        .follow-btn {
            width: 100%; padding: 12px; border-radius: 15px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            background: #00d2ff; color: white;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }
        .follow-btn.following { background: rgba(255,255,255,0.2); border: 1px solid white; box-shadow: none; }
        
        /* FRIENDS LIST MODAL */
        #listModal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 1000; 
            justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: white; color: #333; width: 85%; max-width: 380px; 
            border-radius: 25px; padding: 20px; max-height: 60vh; overflow-y: auto; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
        .chat-btn { background: #1a2a6c; color: white; text-decoration: none; padding: 6px 15px; border-radius: 10px; font-size: 12px; font-weight: bold; }

        .post-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .grid-item {
            aspect-ratio: 1/1; background: rgba(0,0,0,0.3);
            border-radius: 12px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        .back-btn { text-decoration: none; color: white; font-size: 14px; display: inline-block; margin-bottom: 15px; opacity: 0.8; }
        .back-btn:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="profile-container">
        <a href="home.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Feed</a>
        
        <div class="glass-card">
            <div class="profile-header">
                <div id="pfp" class="big-avatar">?</div>
                <h2 id="profile-name" style="margin: 5px 0;">Loading...</h2>
                <p id="profile-bio" style="font-size: 14px; opacity: 0.8;">Fetching bio...</p>
            </div>

            <div class="stats-grid">
                <div class="stat-box"><span class="stat-val" id="count-posts">0</span><span class="stat-label">Posts</span></div>
                <div class="stat-box" onclick="openFriendsList('followers')">
                    <span class="stat-val" id="count-followers">0</span><span class="stat-label">Followers</span>
                </div>
                <div class="stat-box" onclick="openFriendsList('following')">
                    <span class="stat-val" id="count-following">0</span><span class="stat-label">Following</span>
                </div>
            </div>

            <button id="action-btn" class="follow-btn" onclick="toggleFollow()">Loading...</button>
        </div>

        <div class="glass-card">
            <div style="font-weight: bold; margin-bottom: 10px;"><i class="fas fa-th"></i> Posts</div>
            <div id="user-posts" class="post-grid"></div>
        </div>
    </div>

    <div id="listModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle" style="margin:0">Users</h3>
                <i class="fas fa-times" onclick="closeModal()" style="cursor:pointer"></i>
            </div>
            <div id="userList"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetUser = urlParams.get('user');
        const loggedInUser = localStorage.getItem('vault_username');
        const actionBtn = document.getElementById('action-btn');
        let currentProfileData = null;

        async function loadProfile() {
            if (!targetUser) return window.location.href = 'home.html';

            try {
                const response = await fetch(`/api/profile/${targetUser}`);
                currentProfileData = await response.json();

                if (currentProfileData.error) {
                    alert("User not found");
                    window.location.href = 'home.html';
                    return;
                }

                document.getElementById('profile-name').innerText = currentProfileData.username;
                document.getElementById('pfp').innerText = currentProfileData.username.charAt(0).toUpperCase();
                document.getElementById('profile-bio').innerText = currentProfileData.bio || "No bio yet.";
                document.getElementById('count-posts').innerText = currentProfileData.posts.length;
                document.getElementById('count-followers').innerText = currentProfileData.followersCount;
                document.getElementById('count-following').innerText = currentProfileData.followingCount;

                const postGrid = document.getElementById('user-posts');
                postGrid.innerHTML = currentProfileData.posts.length === 0 ? 
                    '<p style="grid-column: span 3; text-align:center; opacity:0.5; font-size:12px; padding:20px;">No posts yet.</p>' : '';

                currentProfileData.posts.forEach(post => {
                    const item = document.createElement('div');
                    item.className = 'grid-item';
                    if (post.media) {
                        item.innerHTML = post.type === 'video' ? `<video src="${post.media}"></video>` : `<img src="${post.media}">`;
                    } else {
                        item.innerHTML = `<div style="font-size:10px; padding:10px; text-align:center;">${post.caption.substring(0, 30)}...</div>`;
                    }
                    postGrid.appendChild(item);
                });

                if (targetUser === loggedInUser) {
                    actionBtn.innerText = "Edit Profile";
                    actionBtn.style.background = "rgba(255,255,255,0.1)";
                    actionBtn.style.boxShadow = "none";
                } else {
                    const meRes = await fetch(`/api/profile/${loggedInUser}`);
                    const meData = await meRes.json();
                    const isFollowing = meData.following.some(u => u.username === targetUser);
                    actionBtn.innerText = isFollowing ? "Following" : "Follow";
                    actionBtn.classList.toggle('following', isFollowing);
                }
            } catch (err) { console.error(err); }
        }

        async function openFriendsList(type) {
            const modal = document.getElementById('listModal');
            const listDiv = document.getElementById('userList');
            document.getElementById('modalTitle').innerText = type.charAt(0).toUpperCase() + type.slice(1);
            
            modal.style.display = 'flex';
            listDiv.innerHTML = "<p style='text-align:center'>Loading list...</p>";

            // Note: Ensure your server.js populates usernames in the profile route
            const friends = type === 'followers' ? currentProfileData.followers : currentProfileData.following;

            if (!friends || friends.length === 0) {
                listDiv.innerHTML = "<p style='text-align:center; opacity:0.5; padding:20px;'>No " + type + " found.</p>";
                return;
            }

            listDiv.innerHTML = friends.map(f => `
                <div class="user-row">
                    <span style="font-weight:bold">${f.username}</span>
                    <a href="chat.html?user=${f.username}" class="chat-btn">Message</a>
                </div>
            `).join('');
        }

        function closeModal() { document.getElementById('listModal').style.display = 'none'; }

        async function toggleFollow() {
            if (targetUser === loggedInUser) return alert("Profile editing feature is coming!");
            
            actionBtn.disabled = true;
            try {
                const response = await fetch('/api/follow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ myUsername: loggedInUser, targetUsername: targetUser })
                });
                const result = await response.json();
                if (result.success) {
                    actionBtn.innerText = result.isFollowingNow ? "Following" : "Follow";
                    actionBtn.classList.toggle('following', result.isFollowingNow);
                    document.getElementById('count-followers').innerText = result.followerCount;
                    loadProfile(); // Refresh list data
                }
            } catch (err) { alert("Error connecting to server."); }
            finally { actionBtn.disabled = false; }
        }

        loadProfile();
    </script>
</body>
</html>
