<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBNT | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%); }
        body {
            margin: 0; padding: 20px 0; min-height: 100vh;
            display: flex; justify-content: center;
            background: var(--primary-gradient);
            font-family: -apple-system, sans-serif; color: white;
        }
        .profile-container { width: 95%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .profile-header { text-align: center; margin-bottom: 20px; }
        .big-avatar {
            width: 80px; height: 80px; background: rgba(255,255,255,0.2);
            border-radius: 50%; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; border: 2px solid #fdbb2d;
        }
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            text-align: center; margin: 20px 0; border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }
        .stat-val { font-weight: bold; font-size: 18px; display: block; }
        .stat-label { font-size: 12px; opacity: 0.7; }
        
        .follow-btn {
            width: 100%; padding: 10px; border-radius: 15px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            background: #00d2ff; color: white;
        }
        .follow-btn.following { background: rgba(255,255,255,0.2); border: 1px solid white; }
        
        .post-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px;
        }
        .grid-item {
            aspect-ratio: 1/1; background: rgba(0,0,0,0.2);
            border-radius: 5px; overflow: hidden;
        }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .back-btn {
            text-decoration: none; color: white; font-size: 14px;
            display: inline-block; margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <a href="home.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Feed</a>
        
        <div class="glass-card">
            <div class="profile-header">
                <div id="pfp" class="big-avatar">?</div>
                <h2 id="profile-name" style="margin: 5px 0;">Username</h2>
                <p id="profile-bio" style="font-size: 14px; opacity: 0.8;">No bio yet.</p>
            </div>

            <div class="stats-grid">
                <div><span class="stat-val" id="count-posts">0</span><span class="stat-label">Posts</span></div>
                <div><span class="stat-val" id="count-followers">0</span><span class="stat-label">Followers</span></div>
                <div><span class="stat-val" id="count-following">0</span><span class="stat-label">Following</span></div>
            </div>

            <button id="action-btn" class="follow-btn" onclick="toggleFollow()">Follow</button>
        </div>

        <div class="glass-card">
            <div style="font-weight: bold; margin-bottom: 10px;"><i class="fas fa-th"></i> Posts</div>
            <div id="user-posts" class="post-grid">
                </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetUser = urlParams.get('user');
        const loggedInUser = localStorage.getItem('vault_username');

        // Setup Page
        document.getElementById('profile-name').innerText = targetUser;
        document.getElementById('pfp').innerText = targetUser.charAt(0).toUpperCase();

        // Check if it's MY profile
        const actionBtn = document.getElementById('action-btn');
        if (targetUser === loggedInUser) {
            actionBtn.innerText = "Edit Profile";
            actionBtn.style.background = "rgba(255,255,255,0.1)";
        }

        function toggleFollow() {
            if (targetUser === loggedInUser) {
                alert("Editing profile coming soon!");
                return;
            }
            
            if (actionBtn.classList.contains('following')) {
                actionBtn.classList.remove('following');
                actionBtn.innerText = "Follow";
                // Logic to decrease follower count would go here
            } else {
                actionBtn.classList.add('following');
                actionBtn.innerText = "Following";
                // Logic to increase follower count would go here
            }
        }
    </script>
</body>
</html>
