<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBNT | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%); }
        body {
            margin: 0; background: var(--primary-gradient); min-height: 100vh;
            font-family: -apple-system, sans-serif; color: white; display: flex; justify-content: center;
        }
        .profile-container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); margin-bottom: 20px;
        }
        
        /* Header Section */
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .pfp-container {
            width: 90px; height: 90px; background: #333; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; border: 3px solid #fdbb2d; overflow: hidden; flex-shrink: 0;
        }
        .stats-row { display: flex; gap: 20px; margin-top: 10px; }
        .stat-item { text-align: center; flex: 1; }
        .stat-num { font-weight: bold; font-size: 18px; display: block; }
        .stat-label { font-size: 12px; opacity: 0.7; }

        .action-btn {
            width: 100%; background: white; color: #1a2a6c; border: none;
            padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer;
            margin-top: 15px; transition: 0.3s;
        }

        /* Post Grid */
        .feed-header { font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .grid-item { 
            aspect-ratio: 1/1; background: rgba(0,0,0,0.2); border-radius: 8px; 
            overflow: hidden; cursor: pointer;
        }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        .no-posts { grid-column: span 3; text-align: center; padding: 40px; opacity: 0.5; }

        /* Modal styling */
        #editModal input, #editModal textarea { width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="glass-card">
        <div style="margin-bottom: 15px;"><a href="home.html" style="color: white; text-decoration: none;"><i class="fas fa-arrow-left"></i> Back</a></div>
        <div class="profile-header">
            <div id="pfp" class="pfp-container"></div>
            <div style="flex-grow: 1;">
                <h2 id="profile-name" style="margin: 0;">Loading...</h2>
                <div class="stats-row">
                    <div class="stat-item"><span class="stat-num" id="count-posts">0</span><span class="stat-label">Posts</span></div>
                    <div class="stat-item"><span class="stat-num" id="count-followers">0</span><span class="stat-label">Followers</span></div>
                    <div class="stat-item"><span class="stat-num" id="count-following">0</span><span class="stat-label">Following</span></div>
                </div>
            </div>
        </div>
        <p id="profile-bio" style="font-size: 14px; line-height: 1.5; margin: 0;"></p>
        <button id="action-btn" class="action-btn">Follow</button>
    </div>

    <div class="glass-card">
        <div class="feed-header">
            <span><i class="fas fa-th"></i> Gallery</span>
        </div>
        <div id="user-posts" class="post-grid">
            </div>
    </div>
</div>

<div id="editModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); z-index: 2000; justify-content: center; align-items: center;">
    <div class="glass-card" style="width: 90%; max-width: 400px; background: white; color: #333;">
        <h3 style="margin-top: 0; color: #1a2a6c;">Edit Profile</h3>
        <label style="font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px;">Profile Picture</label>
        <input type="file" id="edit-pfp-input" accept="image/*" style="margin-bottom: 15px;">
        <label style="font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px;">Bio</label>
        <textarea id="edit-bio-input" placeholder="Tell the vault about yourself..." style="height: 80px; border-radius: 10px; border: 1px solid #ddd; padding: 10px; margin-bottom: 15px; resize: none;"></textarea>
        <div style="display: flex; gap: 10px;">
            <button onclick="saveProfile()" id="save-btn" style="flex: 2; background: #1a2a6c; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer;">Save</button>
            <button onclick="closeEditModal()" style="flex: 1; background: #eee; border: none; padding: 12px; border-radius: 10px; cursor: pointer;">Cancel</button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetUser = urlParams.get('user');
    const loggedInUser = localStorage.getItem('vault_username');
    const actionBtn = document.getElementById('action-btn');
    let currentProfileData = null;

    async function loadProfile() {
        if (!targetUser) return window.location.href = 'home.html';
        
        try {
            // 1. Fetch User Info
            const response = await fetch(`/api/profile/${targetUser}`);
            currentProfileData = await response.json();

            document.getElementById('profile-name').innerText = currentProfileData.username;
            document.getElementById('profile-bio').innerText = currentProfileData.bio || "Vault citizen.";
            
            const pfpDiv = document.getElementById('pfp');
            if (currentProfileData.profilePic) {
                pfpDiv.innerHTML = `<img src="${currentProfileData.profilePic}" style="width:100%; height:100%; object-fit:cover;">`;
            } else {
                pfpDiv.innerText = currentProfileData.username.charAt(0).toUpperCase();
            }

            document.getElementById('count-followers').innerText = currentProfileData.followersCount || 0;
            document.getElementById('count-following').innerText = currentProfileData.followingCount || 0;

            // 2. Fetch only THIS user's posts
            const postRes = await fetch(`/api/posts?user=${targetUser}`);
            const posts = await postRes.json();
            const grid = document.getElementById('user-posts');
            document.getElementById('count-posts').innerText = posts.length;

            if (posts.length === 0) {
                grid.innerHTML = '<div class="no-posts">No media vaulted yet.</div>';
            } else {
                grid.innerHTML = posts.map(post => {
                    if (!post.media) return `<div class="grid-item" style="display:flex; align-items:center; padding:5px; font-size:10px;">${post.caption}</div>`;
                    return `
                        <div class="grid-item">
                            ${post.type === 'video' ? `<video src="${post.media}"></video>` : `<img src="${post.media}">`}
                        </div>
                    `;
                }).join('');
            }

            // 3. Handle Action Button
            if (targetUser === loggedInUser) {
                actionBtn.innerText = "Edit Profile";
                actionBtn.onclick = openEditModal;
            } else {
                actionBtn.innerText = "Follow";
                // Add follow logic here later
            }

        } catch (err) { console.error("Profile load failed:", err); }
    }

    function openEditModal() {
        document.getElementById('edit-bio-input').value = currentProfileData.bio || "";
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

    async function saveProfile() {
        const btn = document.getElementById('save-btn');
        const bio = document.getElementById('edit-bio-input').value;
        const pfpFile = document.getElementById('edit-pfp-input').files[0];
        
        btn.innerText = "Saving...";
        btn.disabled = true;

        let base64Image = currentProfileData.profilePic;

        if (pfpFile) {
            base64Image = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(pfpFile);
            });
        }

        try {
            const res = await fetch('/api/update-profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: loggedInUser, 
                    bio: bio, 
                    profilePic: base64Image 
                })
            });
            const result = await res.json();
            if (result.success) {
                location.reload();
            } else {
                alert("Error: " + result.error);
                btn.innerText = "Save";
                btn.disabled = false;
            }
        } catch (err) { alert("Server error"); }
    }

    loadProfile();
</script>
</body>
</html>
