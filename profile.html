<div id="editModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 2000; justify-content: center; align-items: center;">
    <div class="glass-card" style="width: 90%; max-width: 400px; background: white; color: #333;">
        <h3 style="margin-top: 0; color: #1a2a6c;">Edit Profile</h3>
        
        <label style="font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px;">Profile Picture</label>
        <input type="file" id="edit-pfp-input" accept="image/*" style="margin-bottom: 15px; font-size: 12px;">
        
        <label style="font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px;">Bio</label>
        <textarea id="edit-bio-input" placeholder="Tell the vault about yourself..." style="width: 100%; height: 80px; border-radius: 10px; border: 1px solid #ddd; padding: 10px; font-family: inherit; margin-bottom: 15px;"></textarea>
        
        <div style="display: flex; gap: 10px;">
            <button onclick="saveProfile()" id="save-btn" style="flex: 2; background: #1a2a6c; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer;">Save Changes</button>
            <button onclick="closeEditModal()" style="flex: 1; background: #eee; border: none; padding: 12px; border-radius: 10px; cursor: pointer;">Cancel</button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetUser = urlParams.get('user');
    const loggedInUser = localStorage.getItem('vault_username');
    const actionBtn = document.getElementById('action-btn');
    let currentProfileData = null;

    async function loadProfile() {
        if (!targetUser) return window.location.href = 'home.html';
        try {
            const response = await fetch(`/api/profile/${targetUser}`);
            currentProfileData = await response.json();

            // Update UI
            document.getElementById('profile-name').innerText = currentProfileData.username;
            document.getElementById('profile-bio').innerText = currentProfileData.bio || "No bio yet.";
            
            // Handle Profile Picture (Image or Initial)
            const pfpDiv = document.getElementById('pfp');
            if (currentProfileData.profilePic) {
                pfpDiv.innerHTML = `<img src="${currentProfileData.profilePic}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
            } else {
                pfpDiv.innerText = currentProfileData.username.charAt(0).toUpperCase();
            }

            document.getElementById('count-posts').innerText = currentProfileData.posts.length;
            document.getElementById('count-followers').innerText = currentProfileData.followersCount || 0;
            document.getElementById('count-following').innerText = currentProfileData.followingCount || 0;

            // ... (Your existing post rendering logic here) ...

            if (targetUser === loggedInUser) {
                actionBtn.innerText = "Edit Profile";
                actionBtn.onclick = openEditModal; // Change the click action
            }
        } catch (err) { console.error(err); }
    }

    function openEditModal() {
        document.getElementById('edit-bio-input').value = currentProfileData.bio || "";
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

    async function saveProfile() {
        const btn = document.getElementById('save-btn');
        const bio = document.getElementById('edit-bio-input').value;
        const pfpFile = document.getElementById('edit-pfp-input').files[0];
        
        btn.innerText = "Saving...";
        btn.disabled = true;

        let base64Image = currentProfileData.profilePic;

        // Convert image to Base64 if a new one is selected
        if (pfpFile) {
            base64Image = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(pfpFile);
            });
        }

        try {
            const res = await fetch('/api/update-profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username: loggedInUser, 
                    bio: bio, 
                    profilePic: base64Image 
                })
            });
            const result = await res.json();
            if (result.success) {
                location.reload();
            } else {
                alert("Error: " + result.error);
            }
        } catch (err) { alert("Server error"); }
    }

    loadProfile();
</script>
