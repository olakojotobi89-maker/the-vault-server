<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBNT | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%); }
        body {
            margin: 0; padding: 20px 0; min-height: 100vh;
            display: flex; justify-content: center;
            background: var(--primary-gradient);
            font-family: -apple-system, sans-serif; color: white;
        }
        .profile-container { width: 95%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .profile-header { text-align: center; margin-bottom: 20px; }
        .big-avatar {
            width: 80px; height: 80px; background: rgba(255,255,255,0.2);
            border-radius: 50%; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; border: 2px solid #fdbb2d;
        }
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            text-align: center; margin: 20px 0; border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }
        .stat-val { font-weight: bold; font-size: 18px; display: block; }
        .stat-label { font-size: 12px; opacity: 0.7; }
        
        .follow-btn {
            width: 100%; padding: 10px; border-radius: 15px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            background: #00d2ff; color: white;
        }
        .follow-btn.following { background: rgba(255,255,255,0.2); border: 1px solid white; }
        
        .post-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px;
        }
        .grid-item {
            aspect-ratio: 1/1; background: rgba(0,0,0,0.2);
            border-radius: 5px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        .back-btn {
            text-decoration: none; color: white; font-size: 14px;
            display: inline-block; margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <a href="home.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Feed</a>
        
        <div class="glass-card">
            <div class="profile-header">
                <div id="pfp" class="big-avatar">?</div>
                <h2 id="profile-name" style="margin: 5px 0;">Loading...</h2>
                <p id="profile-bio" style="font-size: 14px; opacity: 0.8;">Fetching bio...</p>
            </div>

            <div class="stats-grid">
                <div><span class="stat-val" id="count-posts">0</span><span class="stat-label">Posts</span></div>
                <div><span class="stat-val" id="count-followers">0</span><span class="stat-label">Followers</span></div>
                <div><span class="stat-val" id="count-following">0</span><span class="stat-label">Following</span></div>
            </div>

            <button id="action-btn" class="follow-btn" onclick="toggleFollow()">Follow</button>
        </div>

        <div class="glass-card">
            <div style="font-weight: bold; margin-bottom: 10px;"><i class="fas fa-th"></i> Posts</div>
            <div id="user-posts" class="post-grid">
                </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetUser = urlParams.get('user');
        const loggedInUser = localStorage.getItem('vault_username');
        const actionBtn = document.getElementById('action-btn');

        // 1. Fetch Profile Data from Server
        async function loadProfile() {
            if (!targetUser) return window.location.href = 'home.html';

            try {
                const response = await fetch(`/api/profile/${targetUser}`);
                const data = await response.json();

                if (data.error) {
                    alert("User not found");
                    window.location.href = 'home.html';
                    return;
                }

                // Update UI
                document.getElementById('profile-name').innerText = data.username;
                document.getElementById('pfp').innerText = data.username.charAt(0).toUpperCase();
                document.getElementById('profile-bio').innerText = data.bio;
                document.getElementById('count-posts').innerText = data.posts.length;
                document.getElementById('count-followers').innerText = data.followersCount;
                document.getElementById('count-following').innerText = data.followingCount;

                // Load the grid of posts
                const postGrid = document.getElementById('user-posts');
                postGrid.innerHTML = ''; 
                data.posts.forEach(post => {
                    const item = document.createElement('div');
                    item.className = 'grid-item';
                    if (post.media) {
                        if (post.media.includes('video')) {
                            item.innerHTML = `<video src="${post.media}"></video>`;
                        } else {
                            item.innerHTML = `<img src="${post.media}">`;
                        }
                    } else {
                        item.style.fontSize = '10px';
                        item.style.padding = '5px';
                        item.innerText = post.caption.substring(0, 20) + "...";
                    }
                    postGrid.appendChild(item);
                });

                // Check Follow Status
                if (targetUser === loggedInUser) {
                    actionBtn.innerText = "Edit Profile";
                    actionBtn.style.background = "rgba(255,255,255,0.1)";
                } else {
                    if (data.followersList.includes(loggedInUser)) {
                        actionBtn.innerText = "Following";
                        actionBtn.classList.add('following');
                    }
                }
            } catch (err) {
                console.error("Failed to load profile", err);
            }
        }

        // 2. Handle Follow/Unfollow Click
        async function toggleFollow() {
            if (targetUser === loggedInUser) {
                alert("Edit Profile features (Bio, PFP) coming soon!");
                return;
            }
            
            try {
                const response = await fetch('/api/follow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        myUsername: loggedInUser, 
                        targetUsername: targetUser 
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    actionBtn.innerText = result.isFollowingNow ? "Following" : "Follow";
                    actionBtn.classList.toggle('following', result.isFollowingNow);
                    document.getElementById('count-followers').innerText = result.followerCount;
                }
            } catch (err) {
                alert("Connection failed. Try again.");
            }
        }

        loadProfile();
    </script>
</body>
</html>
