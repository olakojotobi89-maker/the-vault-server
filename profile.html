<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBNT | Profile</title>

    <script>
        // Security Check
        if (!localStorage.getItem('vault_username')) {
            window.location.href = 'index.html';
        }
    </script>

    <link rel="stylesheet" href="/style.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%); }
        body {
            margin: 0; padding: 20px 0; min-height: 100vh;
            display: flex; justify-content: center;
            background: var(--primary-gradient);
            font-family: -apple-system, sans-serif; color: white;
        }
        .container { width: 95%; max-width: 500px; display: flex; flex-direction: column; gap: 20px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        /* Profile Header */
        .header-box { text-align: center; position: relative; }
        .pfp-container {
            width: 110px; height: 110px; border-radius: 50%; background: #333;
            margin: 0 auto 15px; border: 3px solid #fdbb2d; overflow: hidden;
            display: flex; align-items: center; justify-content: center; font-size: 40px;
            cursor: pointer; position: relative;
        }
        .pfp-container img { width: 100%; height: 100%; object-fit: cover; }
        .pfp-overlay {
            position: absolute; bottom: 0; background: rgba(0,0,0,0.6);
            width: 100%; font-size: 11px; padding: 3px 0; display: none;
        }
        .pfp-container:hover .pfp-overlay { display: block; }

        .user-title { font-size: 24px; font-weight: bold; margin-bottom: 8px; }
        .bio-display { font-size: 14px; opacity: 0.8; line-height: 1.5; margin-bottom: 15px; }
        
        .edit-input {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; color: white; padding: 10px; margin-bottom: 10px; 
            display: none; font-family: inherit; resize: none;
        }

        .action-btn {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 8px 20px; border-radius: 12px; cursor: pointer; transition: 0.3s;
            font-weight: 600;
        }
        .action-btn:hover { background: rgba(255,255,255,0.25); }
        .follow-btn { background: #fdbb2d; color: black; border: none; }
        .follow-btn.following { background: rgba(255,255,255,0.2); color: white; }

        /* Stats Row */
        .stats { display: flex; justify-content: space-around; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .stat-item { text-align: center; cursor: pointer; }
        .stat-val { display: block; font-weight: bold; font-size: 18px; }
        .stat-label { font-size: 11px; opacity: 0.6; text-transform: uppercase; }

        /* Grid Feed */
        .grid-feed {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            margin-top: 10px;
        }
        .grid-item {
            aspect-ratio: 1/1; background: rgba(0,0,0,0.2); border-radius: 12px;
            overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
        }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        .grid-text { padding: 10px; font-size: 10px; opacity: 0.7; overflow: hidden; }

        /* Modal / Post Overlay */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000; display: none;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content { width: 100%; max-width: 450px; position: relative; }
        .close-modal { position: absolute; top: -40px; right: 0; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <a href="home.html" style="color: white; text-decoration: none; font-size: 14px;">
                <i class="fas fa-arrow-left"></i> Feed
            </a>
            <a href="setting.html" style="color: white; opacity: 0.7;"><i class="fas fa-cog"></i></a>
        </div>

        <div class="glass-card header-box">
            <div class="pfp-container" onclick="triggerPfpUpload()">
                <div id="pfp-target">?</div>
                <div class="pfp-overlay" id="pfp-hint">Change</div>
                <input type="file" id="pfp-file" accept="image/*" style="display:none" onchange="uploadPfp()">
            </div>

            <div class="user-title" id="display-username">Loading...</div>
            <div class="bio-display" id="display-bio">Initializing vault...</div>
            
            <textarea id="edit-bio-input" class="edit-input" placeholder="Update your bio..."></textarea>
            
            <div id="profile-controls">
                <button id="edit-btn" class="action-btn" onclick="toggleEdit()" style="display:none">Edit Profile</button>
                <button id="follow-btn" class="action-btn follow-btn" onclick="handleFollow()" style="display:none">Follow</button>
                <button id="save-btn" class="action-btn" onclick="saveBio()" style="display:none; background: #fdbb2d; color: black;">Save Bio</button>
            </div>

            <div class="stats">
                <div class="stat-item"><span class="stat-val" id="count-posts">0</span><span class="stat-label">Posts</span></div>
                <div class="stat-item"><span class="stat-val" id="count-followers">0</span><span class="stat-label">Followers</span></div>
                <div class="stat-item"><span class="stat-val" id="count-following">0</span><span class="stat-label">Following</span></div>
                <div class="stat-item"><span class="stat-val" id="count-likes">0</span><span class="stat-label">Likes</span></div>
            </div>
        </div>

        <div class="grid-feed" id="profile-grid"></div>
    </div>

    <div class="modal" id="post-modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="document.getElementById('post-modal').style.display='none'">&times;</span>
            <div id="modal-render"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const profileUser = urlParams.get('user') || localStorage.getItem('vault_username');
        const myName = localStorage.getItem('vault_username');
        let isFollowing = false;

        async function initProfile() {
            try {
                const userRes = await fetch(`/api/profile/${profileUser}`);
                const userData = await userRes.json();

                document.getElementById('display-username').innerText = profileUser;
                document.getElementById('display-bio').innerText = userData.bio || "No bio yet.";
                
                // Set Stats
                document.getElementById('count-followers').innerText = userData.followers ? userData.followers.length : 0;
                document.getElementById('count-following').innerText = userData.following ? userData.following.length : 0;

                if (userData.profilePic) {
                    document.getElementById('pfp-target').innerHTML = `<img src="${userData.profilePic}">`;
                } else {
                    document.getElementById('pfp-target').innerText = profileUser.charAt(0).toUpperCase();
                }

                // Logic for Follow vs Edit Button
                const followBtn = document.getElementById('follow-btn');
                const editBtn = document.getElementById('edit-btn');

                if (profileUser === myName) {
                    editBtn.style.display = 'inline-block';
                    document.getElementById('pfp-hint').style.display = 'block';
                } else {
                    followBtn.style.display = 'inline-block';
                    // Check if already following
                    if (userData.followers && userData.followers.includes(myName)) {
                        isFollowing = true;
                        followBtn.innerText = "Following";
                        followBtn.classList.add('following');
                    }
                }

                const postRes = await fetch(`/api/posts/user/${profileUser}`);
                const posts = await postRes.json();
                const grid = document.getElementById('profile-grid');
                grid.innerHTML = '';
                document.getElementById('count-posts').innerText = posts.length;

                let totalLikes = 0;
                posts.forEach(post => {
                    totalLikes += (post.likes || 0);
                    const item = document.createElement('div');
                    item.className = 'grid-item';
                    item.onclick = () => openFullPost(post);
                    if (post.media) {
                        item.innerHTML = post.type === 'video' 
                            ? `<video src="${post.media}"></video>` 
                            : `<img src="${post.media}">`;
                    } else {
                        item.innerHTML = `<div class="grid-text">${post.caption}</div>`;
                    }
                    grid.appendChild(item);
                });
                document.getElementById('count-likes').innerText = totalLikes;

            } catch (err) { console.error("Error loading profile:", err); }
        }

        async function handleFollow() {
            const btn = document.getElementById('follow-btn');
            btn.disabled = true;

            try {
                const res = await fetch('/api/follow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        follower: myName, 
                        target: profileUser 
                    })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.reload(); // Refresh to update counts
                }
            } catch (err) {
                console.error("Follow error:", err);
                btn.disabled = false;
            }
        }

        // Existing functions (toggleEdit, saveBio, uploadPfp, openFullPost) remain the same...
        function toggleEdit() {
            const bioText = document.getElementById('display-bio');
            const bioInput = document.getElementById('edit-bio-input');
            const saveBtn = document.getElementById('save-btn');
            const editBtn = document.getElementById('edit-btn');
            bioText.style.display = 'none';
            bioInput.style.display = 'block';
            bioInput.value = bioText.innerText;
            saveBtn.style.display = 'inline-block';
            editBtn.style.display = 'none';
        }

        async function saveBio() {
            const newBio = document.getElementById('edit-bio-input').value;
            try {
                const res = await fetch(`/api/profile/${myName}/bio`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bio: newBio })
                });
                if (res.ok) window.location.reload();
            } catch (err) { alert("Failed to save."); }
        }

        function triggerPfpUpload() {
            if (profileUser === myName) document.getElementById('pfp-file').click();
        }

        async function uploadPfp() {
            const file = document.getElementById('pfp-file').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result;
                const res = await fetch(`/api/profile/${myName}/pfp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64 })
                });
                if (res.ok) window.location.reload();
            };
        }

        function openFullPost(post) {
            const modal = document.getElementById('post-modal');
            const render = document.getElementById('modal-render');
            let mediaContent = '';
            if (post.media) {
                mediaContent = post.type === 'video' 
                    ? `<video src="${post.media}" controls style="width:100%; border-radius:20px;"></video>` 
                    : `<img src="${post.media}" style="width:100%; border-radius:20px;">`;
            }
            render.innerHTML = `
                <div class="glass-card" style="padding:15px; background: rgba(0,0,0,0.8);">
                    <div style="font-weight:bold; margin-bottom:12px; display:flex; align-items:center; gap:10px;">
                        <i class="fas fa-user-circle"></i> ${post.sender}
                    </div>
                    ${mediaContent}
                    <p style="margin-top:15px; font-size:15px; line-height:1.5;">${post.caption}</p>
                    <div style="margin-top:15px; font-size:13px; opacity:0.6;">
                        <i class="fas fa-heart" style="color:#ff4b2b"></i> ${post.likes || 0} Likes
                    </div>
                </div>
            `;
            modal.style.display = 'flex';
        }

        initProfile();
    </script>
</body>
</html>
