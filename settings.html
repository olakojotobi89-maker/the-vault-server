<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vault Settings | BBNT</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VaultChat">
    <link rel="apple-touch-icon" href="vault-logo.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%); }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; min-height: 100dvh;
            display: flex; justify-content: center; align-items: flex-start;
            background: var(--primary-gradient);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: white;
        }

        .settings-card {
            width: 95%; max-width: 500px;
            margin-top: calc(20px + env(safe-area-inset-top));
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .header {
            display: flex; align-items: center; gap: 20px; margin-bottom: 30px;
        }

        .header h2 { margin: 0; font-size: 24px; letter-spacing: -0.5px; }

        .back-btn {
            color: white; font-size: 20px; text-decoration: none;
            width: 40px; height: 40px; display: flex; align-items: center;
            justify-content: center; background: rgba(255,255,255,0.1);
            border-radius: 50%; transition: 0.3s;
        }
        .back-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }

        .setting-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .setting-info { display: flex; align-items: center; gap: 15px; font-size: 17px; }
        .setting-info i { width: 25px; color: #fdbb2d; font-size: 18px; }

        /* iOS Style Toggle Switches */
        .switch {
            position: relative; display: inline-block; width: 50px; height: 28px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0;
            background-color: rgba(255,255,255,0.2);
            transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 22px; width: 22px;
            left: 3px; bottom: 3px; background-color: white;
            transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #fdbb2d; }
        input:checked + .slider:before { transform: translateX(22px); }

        .save-btn {
            width: 100%; margin-top: 30px; padding: 16px;
            border-radius: 20px; border: none;
            background: rgba(255,255,255,0.15); color: white;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: 0.3s;
        }
        .save-btn:active { transform: scale(0.98); background: rgba(255,255,255,0.25); }
    </style>
</head>
<body>

    <div class="settings-card">
        <div class="header">
            <a href="profile.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <h2>Vault Settings</h2>
        </div>

        <div class="setting-item">
            <div class="setting-info">
                <i class="fas fa-lock"></i>
                <span>Private Account</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="setting-private">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-item">
            <div class="setting-info">
                <i class="fas fa-moon"></i>
                <span>Dark Glass Theme</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="setting-darkmode">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-item">
            <div class="setting-info">
                <i class="fas fa-bell"></i>
                <span>Notifications</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="setting-notifications">
                <span class="slider"></span>
            </label>
        </div>

        <button class="save-btn" id="save-settings-btn" onclick="saveSettings()">Update Vault</button>
    </div>

    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Vault Settings PWA Ready'))
                    .catch(err => console.log('PWA Error', err));
            });
        }

        const loggedInUser = localStorage.getItem('vault_username');

        async function loadSettings() {
            if (!loggedInUser) return window.location.href = 'index.html';

            try {
                const res = await fetch(`/api/profile/${loggedInUser}`);
                const data = await res.json();

                if (data && data.settings) {
                    document.getElementById('setting-private').checked = data.settings.privateAccount || false;
                    document.getElementById('setting-darkmode').checked = data.settings.darkMode || false;
                    document.getElementById('setting-notifications').checked = data.settings.notifications || false;
                }
            } catch (err) {
                console.error("Failed to load settings:", err);
            }
        }

        async function saveSettings() {
            const btn = document.getElementById('save-settings-btn');
            const originalText = "Update Vault";
            
            btn.innerText = "Syncing with Vault...";
            btn.disabled = true;

            const settings = {
                privateAccount: document.getElementById('setting-private').checked,
                darkMode: document.getElementById('setting-darkmode').checked,
                notifications: document.getElementById('setting-notifications').checked
            };

            try {
                const res = await fetch('/api/update-settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: loggedInUser, 
                        settings: settings 
                    })
                });

                const result = await res.json();
                if (result.success) {
                    btn.innerText = "Vault Updated!";
                    btn.style.background = "#fdbb2d"; 
                    btn.style.color = "#000";
                    
                    setTimeout(() => {
                        btn.innerText = originalText;
                        btn.style.background = ""; 
                        btn.style.color = "";
                        btn.disabled = false;
                    }, 2000);
                }
            } catch (err) {
                alert("Vault Sync Error");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        loadSettings();
    </script>
</body>
</html>
