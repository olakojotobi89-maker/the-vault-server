<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Settings | BBNT</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="settings-card">
        <div class="header">
            <a href="home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <h2>Vault Settings</h2>
        </div>

        <div class="setting-item">
            <div class="setting-info">
                <i class="fas fa-bolt"></i>
                <span>Private Account</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="setting-private">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-item">
            <div class="setting-info">
                <i class="fas fa-moon"></i>
                <span>Dark Glass Theme</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="setting-darkmode">
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-item">
            <div class="setting-info">
                <i class="fas fa-bell"></i>
                <span>Notifications</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="setting-notifications">
                <span class="slider"></span>
            </label>
        </div>

        <button class="save-btn" id="save-settings-btn" onclick="saveSettings()">Update Vault</button>
    </div>

    <script>
        const loggedInUser = localStorage.getItem('vault_username');

        // 1. Load existing settings from the database when page opens
        async function loadSettings() {
            if (!loggedInUser) return window.location.href = 'index.html';

            try {
                const res = await fetch(`/api/profile/${loggedInUser}`);
                const data = await res.json();

                // Check if user and settings exist
                if (data && data.settings) {
                    document.getElementById('setting-private').checked = data.settings.privateAccount || false;
                    document.getElementById('setting-darkmode').checked = data.settings.darkMode || false;
                    document.getElementById('setting-notifications').checked = data.settings.notifications || false;
                }
            } catch (err) {
                console.error("Failed to load settings:", err);
            }
        }

        // 2. Save settings to the database
        async function saveSettings() {
            const btn = document.getElementById('save-settings-btn');
            const originalText = "Update Vault";
            
            btn.innerText = "Syncing with Vault...";
            btn.disabled = true;

            const settings = {
                privateAccount: document.getElementById('setting-private').checked,
                darkMode: document.getElementById('setting-darkmode').checked,
                notifications: document.getElementById('setting-notifications').checked
            };

            try {
                const res = await fetch('/api/update-settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: loggedInUser, 
                        settings: settings 
                    })
                });

                const result = await res.json();
                if (result.success) {
                    btn.innerText = "Vault Updated!";
                    btn.style.background = "#ffd700"; // Gold accent for success
                    btn.style.color = "#000";
                    
                    setTimeout(() => {
                        btn.innerText = originalText;
                        btn.style.background = ""; // Reverts to CSS default
                        btn.style.color = "";
                        btn.disabled = false;
                    }, 2000);
                }
            } catch (err) {
                alert("Vault Sync Error");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // Initialize
        loadSettings();
    </script>
</body>
</html>
