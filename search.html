<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vault | Discover</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VaultChat">
    <link rel="apple-touch-icon" href="vault-logo.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%); }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; padding: 0; min-height: 100dvh; 
            background: var(--primary-gradient); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            color: white; overflow-x: hidden;
        }

        .container { 
            width: 95%; 
            max-width: 500px; 
            margin: auto; 
            padding: 0 0 120px; 
        }

        /* Search Header with Notch Support */
        .search-header {
            position: sticky; 
            top: 0; 
            z-index: 1000;
            background: rgba(26, 42, 108, 0.9); 
            backdrop-filter: blur(25px);
            padding: calc(20px + env(safe-area-inset-top)) 15px 15px; 
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .search-input-wrapper {
            background: rgba(255, 255, 255, 0.15); 
            border-radius: 15px;
            padding: 12px 15px; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-input-wrapper input {
            flex: 1; background: none; border: none; color: white;
            font-size: 17px; outline: none;
        }
        
        .search-input-wrapper input::placeholder { color: rgba(255,255,255,0.5); }

        /* User List Styles */
        .user-list { display: flex; flex-direction: column; gap: 8px; padding: 0 10px; }

        .user-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; border-radius: 18px; transition: 0.2s;
            background: rgba(255,255,255,0.05);
        }

        .user-item:active { background: rgba(255, 255, 255, 0.15); transform: scale(0.98); }

        .user-main { display: flex; align-items: center; gap: 15px; }

        .pfp-vault {
            width: 50px; height: 50px; border-radius: 50%;
            background: #222; border: 2px solid #fdbb2d;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0;
        }

        .pfp-vault img { width: 100%; height: 100%; object-fit: cover; }
        .pfp-vault span { font-size: 18px; font-weight: bold; color: #fdbb2d; }

        .username-container { display: flex; flex-direction: column; }
        .username { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 5px; }
        .full-name { font-size: 13px; opacity: 0.6; margin-top: 2px; }

        .verified-icon { color: #3897f0; font-size: 12px; }

        /* Floating Nav with Home Bar Support */
        .nav-bottom {
            position: fixed; 
            bottom: calc(20px + env(safe-area-inset-bottom)); 
            left: 50%; 
            transform: translateX(-50%);
            width: 90%; 
            max-width: 400px;
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(25px);
            border-radius: 35px; 
            padding: 18px 35px; 
            display: flex;
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 2000;
        }
        
        .nav-item { color: white; opacity: 0.4; font-size: 22px; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: #fdbb2d; }
    </style>
</head>
<body>

    <div class="container">
        <div class="search-header">
            <h2 style="margin: 0 0 15px 5px; letter-spacing: -0.5px; font-size: 28px;">Explore</h2>
            <div class="search-input-wrapper">
                <i class="fas fa-search" style="opacity: 0.5;"></i>
                <input type="text" id="mainSearch" placeholder="Search the Vault..." oninput="searchVault()">
            </div>
        </div>

        <div id="results-area" class="user-list">
            <div style="text-align:center; margin-top:60px;">
                <i class="fas fa-users" style="font-size: 40px; opacity: 0.2; margin-bottom: 15px;"></i>
                <p style="opacity:0.4; font-size: 14px;">Search for agents in the Vault</p>
            </div>
        </div>
    </div>

    <nav class="nav-bottom">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="search.html" class="nav-item active"><i class="fas fa-search"></i></a>
        <a href="chat.html" class="nav-item"><i class="fas fa-comment-alt"></i></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i></a>
    </nav>

    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Vault Explore PWA Ready'))
                    .catch(err => console.log('PWA Error', err));
            });
        }

        async function searchVault() {
            const query = document.getElementById('mainSearch').value.trim();
            const resultsArea = document.getElementById('results-area');

            if (query.length < 1) {
                resultsArea.innerHTML = `
                    <div style="text-align:center; margin-top:60px;">
                        <i class="fas fa-users" style="font-size: 40px; opacity: 0.2; margin-bottom: 15px;"></i>
                        <p style="opacity:0.4; font-size: 14px;">Search for agents in the Vault</p>
                    </div>`;
                return;
            }

            try {
                const res = await fetch(`/api/users/search?q=${encodeURIComponent(query)}`);
                const users = await res.json();

                if (users.length === 0) {
                    resultsArea.innerHTML = '<p style="text-align:center; margin-top:60px; opacity:0.4;">No results found.</p>';
                    return;
                }

                resultsArea.innerHTML = users.map(user => {
                    const profileDisplay = user.profilePic 
                        ? `<img src="${user.profilePic}" alt="${user.username}">` 
                        : `<span>${user.username[0].toUpperCase()}</span>`;

                    return `
                        <div class="user-item" onclick="window.location.href='profile.html?user=${user.username}'">
                            <div class="user-main">
                                <div class="pfp-vault">${profileDisplay}</div>
                                <div class="username-container">
                                    <span class="username">${user.username} <i class="fas fa-check-circle verified-icon"></i></span>
                                    <span class="full-name">${user.fullName || 'Vault Member'}</span>
                                </div>
                            </div>
                            <i class="fas fa-chevron-right" style="opacity:0.2; font-size:12px;"></i>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error("Search Error:", err);
                resultsArea.innerHTML = '<p style="text-align:center; margin-top:60px; opacity:0.4;">Connection error.</p>';
            }
        }
    </script>
</body>
</html>
